        .synthese-tab {

            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);

            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;

        .synthese-tab:hover {

            color: var(--text-primary);

        .synthese-tab.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8B5CF6;
            color: var(--text-primary);
        }

        /* Fire tab blink animation - lockt zurück zur Feuer-Seite */
        @keyframes fireBlink {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 100, 0, 0.6), 0 0 10px rgba(255, 50, 0, 0.4);
                background: rgba(255, 100, 0, 0.3);
                transform: scale(1);
            }
            50% {

                background: rgba(255, 100, 0, 0.6);

        .synthese-tab.fire-blink {
            animation: fireBlink 0.6s ease-in-out 4;
        }

        .synthese-close {

            align-items: center;

            height: 36px;

        .synthese-section-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Score Circle */
        .score-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .score-circle-large {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .score-circle-large svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .score-circle-large .score-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 8;
        }

        .score-circle-large .score-progress {
            fill: none;
            stroke: var(--success);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .score-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .score-label {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Loading */
        .synthese-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);

        .synthese-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Matrix Table */
        .matrix-table-container {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.06));
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(139,92,246,0.25);
        }

        .matrix-table th {
            padding: 12px 10px;
            text-align: center;
            font-weight: 500;
            font-size: 11px;
            background: rgba(0,0,0,0.2);
            border-bottom: 2px solid rgba(139,92,246,0.3);
        }

        .matrix-table th:first-child {
            text-align: left;
            padding-left: 14px;
            color: var(--text-muted);
        }

        .matrix-table th.col-ich {
            color: var(--success);
        }

        .matrix-table th.col-partner {
            color: var(--danger);
        }

        .matrix-table th.col-kombi {
            color: #8B5CF6;
            font-weight: 600;
            background: rgba(139,92,246,0.1);
        }

        .matrix-table td {
            padding: 12px 10px;
            text-align: center;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .matrix-table td:first-child {
            text-align: left;
            padding-left: 14px;
        }

        .matrix-table td.col-kombi {
            background: rgba(139,92,246,0.1);
        }

        .matrix-table tr:last-child td {
            border-bottom: none;
        }

        .matrix-r-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .matrix-r-id {
            font-weight: 600;
        }

        .matrix-r-name {
            color: var(--text-secondary);
        }

        .matrix-r-agod {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .matrix-value {
            font-weight: 600;
        }

        .matrix-value.high {
            color: #22c55e;
        }

        .matrix-value.neutral {
            color: #eab308;
        }

        .matrix-value.low {
            color: #ef4444;
        }

        .matrix-modified {
            margin-left: 2px;
            color: #eab308;
            font-weight: bold;
            font-size: 14px;
            cursor: help;
        }

        .matrix-info {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .matrix-info .high { color: #22c55e; }
        .matrix-info .neutral { color: #eab308; }
        .matrix-info .low { color: #ef4444; }

        .matrix-info .modified-info {
            margin-left: auto;
            cursor: help;
            color: #eab308;
            font-weight: bold;
            font-size: 14px;
        }

        /* Klickbare Matrix-Zellen */
        .matrix-cell-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .matrix-cell-clickable:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: scale(1.02);
        }

        .matrix-cell-clickable:hover::after {
            content: '→';
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: rgba(139, 92, 246, 0.8);
        }

        .matrix-cell-clickable:active {
            transform: scale(0.98);
        }

        /* Klickbare Matrix-Zellen */
        .matrix-cell-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .matrix-cell-clickable:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: scale(1.02);
        }

        .matrix-cell-clickable:hover::after {
            content: '→';
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: rgba(139, 92, 246, 0.8);
        }

        .matrix-cell-clickable:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .matrix-table th,
            .matrix-table td {
                padding: 10px 6px;
                font-size: 11px;
            }

        /* Bedürfnis-Aufschlüsselung */
        .breakdown-header {

        .breakdown-table {
            width: 100%;

        .breakdown-detail-row td {
            background: rgba(37,99,235,0.08) !important;

        @media (max-width: 600px) {
            .breakdown-table { font-size: 10px; min-width: 360px; }

            .breakdown-table td.td-name { max-width: 80px; }
            .td-name-btn { max-width: 80px; }
        }

    <div class="mobile-wip-blocker" id="mobileWipBlocker" style="display:none">

        <button type="button" class="continue-btn" style="margin-top:24px;padding:12px 28px;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;text-transform:none;letter-spacing:0;" onclick="(function(){try{localStorage.setItem('tiage_mobile_warned','1');}catch(e){}document.getElementById('mobileWipBlocker').classList.add('dismissed');document.getElementById('mobileWipBlocker').style.display='none';})()">Trotzdem fortfahren</button>

                <button class="archetype-nav-btn" onclick="navigateArchetype('partner', -1)">‹</button>
                <div class="archetype-info">
                    <div class="archetype-label partner" data-i18n="synthese.labelPartner">PARTNER</div>
                    <div class="archetype-name" id="partnerArchetypeName">-</div>
                </div>
                <button class="archetype-nav-btn" onclick="navigateArchetype('partner', 1)">›</button>
            </div>
        </div>

        <!-- Content -->
        <div class="synthese-content" id="syntheseContent">
            <div class="synthese-loading">
                <div class="synthese-loading-spinner"></div>
                <p data-i18n="synthese.loadingUebersicht">Lade Synthese-Daten...</p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════════
        // TIAGE SYNTHESE ÜBERSICHT - Score & R-Faktoren
        // (Shared code in synthesePageShared.js)
        // ═══════════════════════════════════════════════════════════════════════════

        // Shortcut
        const t = SynthesePageShared.t;

        // R-Faktoren Definitionen mit AGOD-Zuordnung
        const rFaktorenDefs = [
            { id: 'R1', label: 'Leben', icon: '🔥', color: '#E63946', agod: 'O', agodName: 'Orientierung', desc: 'Existenz, Zuneigung, Muße, Intimität & Romantik' },
            { id: 'R2', label: 'Philosophie', icon: '🧠', color: '#2A9D8F', agod: 'A', agodName: 'Archetyp', desc: 'Freiheit, Teilnahme, Identität, Lebensplanung' },
            { id: 'R3', label: 'Dynamik', icon: '⚡', color: '#8B5CF6', agod: 'D', agodName: 'Dominanz', desc: 'Dynamik, Sicherheit' },
            { id: 'R4', label: 'Identität', icon: '💚', color: '#F4A261', agod: 'G', agodName: 'Geschlecht', desc: 'Verständnis, Erschaffen, Verbundenheit' }
        ];

        /**
         * Liest R-Faktoren aus TiageState (SSOT)
         * Werte werden reaktiv aktualisiert via flatNeeds → Resonanz chain
         */
        function calculateRFaktoren() {
            let resonanzIch = { R1: 1.0, R2: 1.0, R3: 1.0, R4: 1.0 };
            let resonanzPartner = { R1: 1.0, R2: 1.0, R3: 1.0, R4: 1.0 };
            let modifiedIch = { R1: false, R2: false, R3: false, R4: false };
            let modifiedPartner = { R1: false, R2: false, R3: false, R4: false };

            // SSOT v4.3: Resonanzfaktoren immer aus TiageState lesen
            // Die reaktive Kette (flatNeeds → Resonanz) hält die Werte aktuell.
            // Nicht unabhängig berechnen — BeduerfnisIds._katalog ist async und
            // möglicherweise noch nicht geladen wenn diese Funktion aufgerufen wird.
            if (typeof TiageState !== 'undefined') {
                const ichData = TiageState.getResonanzFaktoren('ich');
                const partnerData = TiageState.getResonanzFaktoren('partner');
                if (ichData) {
                    resonanzIch = {
                        R1: ichData.R1?.value ?? ichData.R1 ?? 1.0,
                        R2: ichData.R2?.value ?? ichData.R2 ?? 1.0,
                        R3: ichData.R3?.value ?? ichData.R3 ?? 1.0,
                        R4: ichData.R4?.value ?? ichData.R4 ?? 1.0
                    };
                }
                if (partnerData) {
                    resonanzPartner = {
                        R1: partnerData.R1?.value ?? partnerData.R1 ?? 1.0,
                        R2: partnerData.R2?.value ?? partnerData.R2 ?? 1.0,
                        R3: partnerData.R3?.value ?? partnerData.R3 ?? 1.0,
                        R4: partnerData.R4?.value ?? partnerData.R4 ?? 1.0
                    };
                }
            }

            // Prüfen ob Bedürfnisse in der jeweiligen Dimension modifiziert wurden
            modifiedIch = checkModifiedNeeds('ich');
            modifiedPartner = checkModifiedNeeds('partner');

            // Hilfsfunktion: R-Faktoren kombinieren (v3.7: Summe × Similarity / 2)
            // SSOT: Gleiche Formel wie in app-main.js und synthesisCalculator.js
            // SSOT: Gleiche Formel wie combineRFactors() in synthesisCalculator.js
            // Keine Zwischen-Rundung — Display-Rundung per toFixed(2)
            function combineRFactors(R_ich, R_partner) {
                const a = R_ich || 1.0;
                const b = R_partner || 1.0;
                const summe = a + b;
                const similarity = Math.min(a, b) / Math.max(a, b);
                return (summe * similarity) / 2;
            }

            return rFaktorenDefs.map(def => {
                const ichVal = resonanzIch[def.id] || 1.0;
                const partnerVal = resonanzPartner[def.id] || 1.0;
                // FIX: Verwende combineRFactors statt einfacher Multiplikation
                const kombiVal = combineRFactors(ichVal, partnerVal);

                return {
                    ...def,
                    ich: ichVal,
                    partner: partnerVal,
                    kombi: kombiVal,
                    modifiedIch: modifiedIch[def.id],
                    modifiedPartner: modifiedPartner[def.id]
                };
            });
        }

        /**
         * Prüft ob Bedürfnisse in einer Dimension manuell geändert wurden
         * @param {string} person - 'ich' oder 'partner'
         * @returns {Object} { R1: boolean, R2: boolean, R3: boolean, R4: boolean }
         */
        function checkModifiedNeeds(person) {
            const result = { R1: false, R2: false, R3: false, R4: false };

            if (typeof TiageState === 'undefined') return result;

            const flatNeeds = TiageState.get(`flatNeeds.${person}`);
            const archetyp = TiageState.get(`archetypes.${person}.primary`);

            if (!flatNeeds || !archetyp || typeof window.BaseArchetypProfile === 'undefined') {
                return result;
            }

            const baseProfil = window.BaseArchetypProfile[archetyp];
            if (!baseProfil || !baseProfil.umfrageWerte) return result;

            // Kohärenz-Daten für die Dimensions-Prüfung
            const kohaerenz = typeof TiageSynthesis !== 'undefined' ?
                TiageSynthesis.Constants?.ARCHETYP_KOHAERENZ : null;

            if (!kohaerenz) return result;

            // R1 = leben, R2 = philosophie, R3 = dynamik, R4 = identitaet
            const dimensionMap = {
                R1: kohaerenz.leben?.[archetyp],
                R2: kohaerenz.philosophie?.[archetyp],
                R3: kohaerenz.dynamik?.[archetyp],
                R4: kohaerenz.identitaet?.[archetyp]
            };

            for (const [rKey, typisch] of Object.entries(dimensionMap)) {
                if (!typisch) continue;
                for (const [needKey, needDef] of Object.entries(typisch)) {
                    const needId = needDef?.id || needKey;
                    const baseValue = baseProfil.umfrageWerte[needId];
                    const currentValue = flatNeeds[needId];
                    // Als modifiziert markieren wenn > 5 Punkte Unterschied
                    if (baseValue !== undefined && currentValue !== undefined &&
                        Math.abs(baseValue - currentValue) > 5) {
                        result[rKey] = true;
                        break;
                    }
                }
            }

            return result;
        }

        function getValueClass(val) {
            if (val >= 1.1) return 'high';
            if (val <= 0.9) return 'low';
            return 'neutral';
        }

        /**
         * Navigiert zu den Einstellungen mit Filter
         * @param {string} person - 'ich' oder 'partner'
         * @param {string} dimension - 'R1', 'R2', 'R3' oder 'R4'
         */
        function navigateToSettings(person, dimension) {
            const state = SynthesePageShared.getCurrentState();
            const archetype = person === 'ich' ? state.ichArchetype : state.partnerArchetype;
            const url = `needs-editor.html?person=${encodeURIComponent(person)}&archetype=${encodeURIComponent(archetype)}&dimension=${encodeURIComponent(dimension)}`;
            window.location.href = url;
        }

        function generateIchOnlyMatrixHTML(rFaktoren) {
            return `
                <div class="matrix-table-container">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th>R-Faktor</th>
                                <th class="col-ich">ICH</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rFaktoren.map(r => `
                                <tr>
                                    <td>
                                        <div class="matrix-r-label">
                                            <span class="matrix-r-id" style="color: ${r.color};">${r.icon} ${r.id}</span>
                                            <span class="matrix-r-name">${r.label}</span>
                                        </div>
                                        <div class="matrix-r-agod">${r.agod} (${r.agodName})</div>
                                    </td>
                                    <td class="matrix-cell-clickable" onclick="navigateToSettings('ich', '${r.id}')" title="Klicken um ICH/${r.label} in Einstellungen zu öffnen">
                                        <span class="matrix-value ${getValueClass(r.ich)}">${r.ich.toFixed(2)}</span>
                                        ${r.modifiedIch ? '<span class="matrix-modified" title="' + t('synthese.manuallyAdjusted', 'Bedürfnis(se) manuell angepasst') + '">*</span>' : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="matrix-info">
                        <span class="high">&bull; >1.0</span>
                        <span class="neutral">&bull; 1.0</span>
                        <span class="low">&bull; <1.0</span>
                        <span class="modified-info" title="${t('synthese.manuallyAdjustedNote', '* = Bedürfnis(se) in dieser Dimension wurden manuell angepasst')}">*</span>
                    </div>
                </div>
            `;
        }

        function generateMatrixHTML(rFaktoren) {
            return `
                <div class="matrix-table-container">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th>R-Faktor → AGOD</th>
                                <th class="col-ich">ICH</th>
                                <th class="col-partner">PARTNER</th>
                                <th class="col-kombi">ICH × PARTNER</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rFaktoren.map(r => `
                                <tr>
                                    <td>
                                        <div class="matrix-r-label">
                                            <span class="matrix-r-id" style="color: ${r.color};">${r.icon} ${r.id}</span>
                                            <span class="matrix-r-name">${r.label}</span>
                                        </div>
                                        <div class="matrix-r-agod">→ ${r.agod} (${r.agodName})</div>
                                    </td>
                                    <td class="matrix-cell-clickable" onclick="navigateToSettings('ich', '${r.id}')" title="Klicken um ICH/${r.label} in Einstellungen zu öffnen">
                                        <span class="matrix-value ${getValueClass(r.ich)}">${r.ich.toFixed(2)}</span>
                                        ${r.modifiedIch ? '<span class="matrix-modified" title="' + t('synthese.manuallyAdjusted', 'Bedürfnis(se) manuell angepasst') + '">*</span>' : ''}
                                    </td>
                                    <td>
                                        <span class="matrix-value ${getValueClass(r.partner)}">${r.partner.toFixed(2)}</span>
                                        ${r.modifiedPartner ? '<span class="matrix-modified" title="' + t('synthese.manuallyAdjusted', 'Bedürfnis(se) manuell angepasst') + '">*</span>' : ''}
                                    </td>
                                    <td class="col-kombi">
                                        <span class="matrix-value ${getValueClass(r.kombi)}">${r.kombi.toFixed(2)}</span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="matrix-info">
                        <span class="high">● >1.0</span>
                        <span class="neutral">● 1.0</span>
                        <span class="low">● <1.0</span>
                        <span class="modified-info" title="${t('synthese.manuallyAdjustedNote', '* = Bedürfnis(se) in dieser Dimension wurden manuell angepasst')}">*</span>
                    </div>
                </div>
            `;
        }

        /**
         * Initialisierung via Shared Module
         */
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.loadRtiPriorities === 'function') {
                window.loadRtiPriorities();
            }
            SynthesePageShared.init({
                renderContent: renderContent,
                pageTitle: 'synthese.pageTitleUebersicht',
                extraSubscriptions: ['resonanzFaktoren.ich', 'resonanzFaktoren.partner']
            });
        });

        /**
         * Klappt die Detail-Zeile eines Bedürfnisses auf/zu
         */
        function toggleNeedDetail(id) {
            const detailId = 'detail-' + id.replace('#', '');
            const existing = document.getElementById(detailId);
            if (existing) { existing.remove(); return; }

            const need = (typeof BeduerfnisIds !== 'undefined') ? BeduerfnisIds.get(id) : null;
            if (!need) return;

            const btn = document.querySelector(`[data-need-id="${id}"]`);
            if (!btn) return;
            const row = btn.closest('tr');
            if (!row) return;

            const STUFEN_FARBEN = { 1: '#10B981', 2: '#3B82F6', 3: '#8B5CF6', 4: '#F59E0B' };
            const STUFEN_LABELS = { 1: 'Fundament', 2: 'Entfaltung', 3: 'Verbundenheit', 4: 'Sinn' };
            const stufeColor = STUFEN_FARBEN[need.stufe] || '#888';

            let detailHtml = `<span style="font-weight:600;color:${stufeColor};">${need.label || id}</span>`;
            if (need.stufe) detailHtml += ` <span style="font-size:10px;color:${stufeColor};background:${stufeColor}22;padding:1px 6px;border-radius:4px;">${STUFEN_LABELS[need.stufe] || ('Stufe ' + need.stufe)}</span>`;
            if (need.faehigkeit) detailHtml += ` · <span style="font-size:11px;color:rgba(255,255,255,0.5);">${need.faehigkeit}</span>`;
            if (need.synonyme && need.synonyme.length) detailHtml += `<br><span style="font-size:11px;color:rgba(255,255,255,0.35);">${need.synonyme.join(' · ')}</span>`;
            if (need.strategie) detailHtml += `<br><span style="font-size:11px;color:rgba(255,255,255,0.45);font-style:italic;">${need.strategie}</span>`;
            // Legacy fields
            if (need.kontext) detailHtml += ` · <span>${need.kontext}</span>`;
            if (need.frage)   detailHtml += `<br><span class="detail-frage">${need.frage}</span>`;

            const colCount = row.cells.length;
            const detailRow = document.createElement('tr');
            detailRow.id = detailId;
            detailRow.className = 'breakdown-detail-row';
            detailRow.innerHTML = `<td colspan="${colCount}" style="padding:8px 12px 10px 12px;">${detailHtml}</td>`;
            row.after(detailRow);
        }

        /**
         * Basis-Bedürfniswerte aus den geladenen Archetyp-Profilen
         */
        function getBaseNeeds(archetyp) {
            function uw(p) { return p ? (p.umfrageWerte || p.beduerfnisse || null) : null; }
            const map = {
                'single':      uw(typeof SingleProfil      !== 'undefined' ? SingleProfil      : null),
                'duo':         uw(typeof DuoProfil         !== 'undefined' ? DuoProfil         : null),
                'duo_flex':    uw(typeof DuoFlexProfil     !== 'undefined' ? DuoFlexProfil     : null),
                'duoflex':     uw(typeof DuoFlexProfil     !== 'undefined' ? DuoFlexProfil     : null),
                'solopoly':    uw(typeof SolopolyProfil    !== 'undefined' ? SolopolyProfil    : null),
                'polyamor':    uw(typeof PolyamorProfil    !== 'undefined' ? PolyamorProfil    : null),
                'ra':          uw(typeof RAProfil          !== 'undefined' ? RAProfil          : null),
                'lat':         uw(typeof LATProfil         !== 'undefined' ? LATProfil         : null),
                'aromantisch': uw(typeof AromantischProfil !== 'undefined' ? AromantischProfil : null),
            };
            return map[archetyp] || {};
        }

        /**
         * Erzeugt die Bedürfnis-Aufschlüsselungs-Tabelle (nach BeduerfnisIds-Load)
         */
        const STUFEN_LABELS_UEBERSICHT = {
            1: { label: 'Fund.', color: '#10B981' },
            2: { label: 'Entf.', color: '#3B82F6' },
            3: { label: 'Verb.', color: '#8B5CF6' },
            4: { label: 'Sinn',  color: '#F59E0B' }
        };

        function generateNeedsBreakdownHTML(archetyp, person) {
            person = person || 'ich';
            const flatNeeds  = (typeof TiageState !== 'undefined') ? (TiageState.get('flatNeeds.' + person) || {}) : {};
            const personDims = (typeof TiageState !== 'undefined') ? (TiageState.get('personDimensions.' + person) || {}) : {};
            const baseNeeds  = getBaseNeeds(archetyp);

            if (Object.keys(flatNeeds).length === 0) {
                return `<div class="breakdown-empty">Keine Bedürfnisse gespeichert.<br>Bitte auf der Hauptseite Bedürfnisse einstellen.</div>`;
            }

            const profile = {
                geschlecht:        personDims.geschlecht,
                dominanz:          personDims.dominanz,
                orientierung:      personDims.orientierung,
                geschlecht_extras: personDims.geschlecht_extras || {}
            };

            const allBreakdowns = (typeof ProfileModifiers !== 'undefined' && ProfileModifiers.getAllModifierBreakdowns)
                ? ProfileModifiers.getAllModifierBreakdowns(profile) : {};

            // Nach BeduerfnisIds.load() sind _idToKey und getKey verfügbar
            const getKey   = (id) => BeduerfnisIds.getKey(id) || id;
            const getLabel = (id) => BeduerfnisIds.getLabel(id) || id;
            const fmt      = (v)  => (!v || v === 0) ? '' : (v > 0 ? `+${v}` : `${v}`);

            const rows = Object.entries(flatNeeds)
                .filter(([id]) => id.startsWith('#B'))
                .map(([id, final]) => {
                    const key   = getKey(id);
                    const label = getLabel(id);
                    const base  = baseNeeds[id] ?? 50;
                    const bd    = allBreakdowns[id] || { g:0, d:0, o:0, f:0, fu:0, h:0, fr:0, total:0 };
                    const du    = Math.round(final - base - bd.total);
                    const bedEntry = window.BeduerfnisIds && window.BeduerfnisIds.beduerfnisse[id];
                    const stufeNr = bedEntry ? bedEntry.stufe : null;
                    return { id, key, label, base, final, du, stufeNr,
                             g:bd.g||0, d:bd.d||0, o:bd.o||0,
                             f:bd.f||0, fu:bd.fu||0, h:bd.h||0, fr:bd.fr||0,
                             total:bd.total||0 };
                })
                .filter(r => r.total !== 0 || r.du !== 0)
                .sort((a, b) => (Math.abs(b.total)+Math.abs(b.du)) - (Math.abs(a.total)+Math.abs(a.du)));

            if (rows.length === 0) {
                return `<div class="breakdown-empty">Keine Modifikatoren aktiv.<br>Geschlecht / Dominanz / Orientierung auf der Hauptseite einstellen.</div>`;
            }

            const extras = personDims.geschlecht_extras || {};
            const hasFFH = extras.fit || extras.fuckedup || extras.horny || extras.fresh;

            const c = (v) => v > 0 ? 'color:#10B981' : v < 0 ? 'color:#EF4444' : '';

            const tableRows = rows.map(r => {
                const stufeDef = r.stufeNr ? STUFEN_LABELS_UEBERSICHT[r.stufeNr] : null;
                const stufeCell = stufeDef
                    ? `<td style="color:${stufeDef.color};font-size:10px;font-weight:600;white-space:nowrap;">${stufeDef.label}</td>`
                    : `<td style="color:rgba(255,255,255,0.2);">–</td>`;
                return `
                <tr>
                    <td class="td-name">
                        <button class="td-name-btn" data-need-id="${r.id}"
                                onclick="toggleNeedDetail('${r.id}')"
                                title="Details zu: ${r.label}">${r.label}</button>
                    </td>
                    ${stufeCell}
                    <td>${r.base}</td>
                    <td style="${c(r.g)}">${fmt(r.g)}</td>
                    <td style="${c(r.d)}">${fmt(r.d)}</td>
                    <td style="${c(r.o)}">${fmt(r.o)}</td>
                    <td style="${c(r.f)}">${fmt(r.f)}</td>
                    <td style="${c(r.fu)}">${fmt(r.fu)}</td>
                    <td style="${c(r.h)}">${fmt(r.h)}</td>
                    <td style="${c(r.fr)}">${fmt(r.fr)}</td>
                    <td style="${c(r.du)}">${fmt(r.du)}</td>
                    <td>=</td>
                    <td class="td-final">${r.final}</td>
                </tr>`;
            }).join('');

            return `
                <div class="breakdown-info">
                    <strong>ℹ️ GOD+FFH Modifikatoren</strong><br>
                    ${rows.length} Bedürfnisse durch G/O/D${hasFFH ? '/FFH' : ''}${rows.some(r => r.du !== 0) ? '/Manuell' : ''} angepasst · Klick auf Name für Details
                </div>
                <div class="breakdown-table-wrap">
                    <table class="breakdown-table">
                        <thead><tr>
                            <th class="th-left">Bedürfnis</th>
                            <th>Stufe</th>
                            <th>Basis</th><th>G</th><th>D</th><th>O</th>
                            <th>F</th><th>FU</th><th>H</th><th>FR</th>
                            <th class="th-du" title="Manuelle Slider-Abweichung von der automatischen Berechnung">±</th><th>=</th><th>Final</th>
                        </tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>`;
        }

        /**
         * Berechnet Evolutionsstufen-HTML für die Übersicht
         */
        function generateStufenHTML(ichArchetype, partnerArchetype) {
            if (typeof TiageSynthesis === 'undefined' ||
                !TiageSynthesis.NeedsIntegration ||
                !TiageSynthesis.NeedsIntegration._calculateStufeBreakdown) return '';

            function combineRF(a, b) {
                const sum = (a || 1.0) + (b || 1.0);
                const sim = Math.min(a || 1.0, b || 1.0) / Math.max(a || 1.0, b || 1.0);
                return (sum * sim) / 2;
            }

            const ichNeeds = (typeof TiageState !== 'undefined')
                ? (TiageState.getFlatNeeds ? TiageState.getFlatNeeds('ich') : TiageState.get('flatNeeds.ich') || {})
                : {};

            const ni = TiageSynthesis.NeedsIntegration;
            const ichStufen = ni._calculateStufeBreakdown(ichNeeds, ichArchetype);
            if (!ichStufen.enabled) return '';

            let partnerStufen = null;
            if (partnerArchetype) {
                const partnerNeeds = (typeof TiageState !== 'undefined')
                    ? (TiageState.getFlatNeeds ? TiageState.getFlatNeeds('partner') : TiageState.get('flatNeeds.partner') || {})
                    : {};
                if (Object.keys(partnerNeeds).length > 0) {
                    partnerStufen = ni._calculateStufeBreakdown(partnerNeeds, partnerArchetype);
                    if (!partnerStufen.enabled) partnerStufen = null;
                }
            }

            const stufenDefs = [
                { key: 'S1', label: 'Fundament',    desc: 'Existenz · Sicherheit · Ruhe · Alltag',                   color: '#10B981' },
                { key: 'S2', label: 'Entfaltung',   desc: 'Freiheit · Ausdruck · Kink · Kommunikation',              color: '#3B82F6' },
                { key: 'S3', label: 'Verbundenheit',desc: 'Zuneigung · Intimität · Werte · Soziales',                 color: '#8B5CF6' },
                { key: 'S4', label: 'Sinn',         desc: 'Verständnis · Identität · Lebensplanung · Spiritualität',  color: '#F59E0B' }
            ];

            const items = stufenDefs.map(s => {
                const ichVal = ichStufen[s.key] || 1.0;
                const val = partnerStufen ? combineRF(ichVal, partnerStufen[s.key] || 1.0) : ichVal;
                const pct = Math.round(val * 100);
                const barWidth = Math.min(100, Math.max(0, pct));
                return `<div style="padding:8px 10px;background:rgba(20,20,30,0.5);border-radius:7px;border-left:3px solid ${s.color};">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                        <span style="font-size:12px;font-weight:600;color:${s.color};">${s.label}</span>
                        <span style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.8);">${pct}%</span>
                    </div>
                    <div style="height:3px;background:rgba(255,255,255,0.1);border-radius:2px;">
                        <div style="height:100%;width:${barWidth}%;background:${s.color};border-radius:2px;opacity:0.8;"></div>
                    </div>
                    <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px;">${s.desc}</div>
                </div>`;
            }).join('');

            const subtitle = partnerStufen ? 'ICH × PARTNER — Resonanz nach Entwicklungsstufen' : 'ICH — Resonanz nach Entwicklungsstufen';
            return `
                <div class="synthese-section">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">🧬</span>
                        <div>
                            <div class="synthese-section-title">Evolutionäre Bedürfnisstärke</div>
                            <div class="synthese-section-subtitle">${subtitle}</div>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
                        ${items}
                    </div>
                </div>`;
        }

        /**
         * Rendert den Hauptinhalt — wartet auf async BeduerfnisIds.load()
         */
        async function renderContent() {
            const container = document.getElementById('syntheseContent');

            // Ladeindikator
            container.innerHTML = `<div class="synthese-loading">
                <div class="synthese-loading-spinner"></div>
                <p>Lade Bedürfnis-Katalog...</p>
            </div>`;

            // Katalog und OshoZen-Daten laden
            if (typeof BeduerfnisIds !== 'undefined' && BeduerfnisIds.load) {
                await BeduerfnisIds.load().catch(() => {});
            }
            if (typeof OshoZenTextGenerator !== 'undefined' && !OshoZenTextGenerator.isDataLoaded()) {
                await OshoZenTextGenerator.loadData().catch(() => {});
            }

            const state = SynthesePageShared.getCurrentState();
            const names = SynthesePageShared.archetypeNames;
            const label = names[state.ichArchetype] || state.ichArchetype;
            const ichNeeds = (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds)
                ? TiageState.getFlatNeeds('ich') : {};

            const top5Html = renderTop5SectionUebersicht(ichNeeds, state.ichArchetype);
            const breakdownHtml = `<div class="synthese-section">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">🎯</span>
                        <div>
                            <div class="synthese-section-title">ICH: ${label}</div>
                            <div class="synthese-section-subtitle breakdown-header">Bedürfnis-Aufschlüsselung</div>
                        </div>
                    </div>
                    ${generateNeedsBreakdownHTML(state.ichArchetype, 'ich')}
                </div>`;
            _U_breakdownHtml = breakdownHtml;
            _U_activeNeedId  = null;

            // Gemeinsame Bedürfnisse (Resonanz) Section
            let resonanzHtml = '';
            if (state.hasPartner && typeof OshoZenTextGenerator !== 'undefined') {
                let needs1 = ichNeeds;
                let needs2 = (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds)
                    ? TiageState.getFlatNeeds('partner') : {};
                if (Object.keys(needs2).length === 0 && typeof BaseArchetypProfile !== 'undefined') {
                    const bp = BaseArchetypProfile[state.partnerArchetype];
                    if (bp && bp.umfrageWerte) needs2 = bp.umfrageWerte;
                }
                const oshoContent = OshoZenTextGenerator.generateSync({
                    profile1: { name: names[state.ichArchetype], needs: needs1, beduerfnisse: needs1 },
                    profile2: { name: names[state.partnerArchetype], needs: needs2, beduerfnisse: needs2 },
                    name1: names[state.ichArchetype],
                    name2: names[state.partnerArchetype],
                    topN: 5
                });
                resonanzHtml = `<div class="synthese-section" style="margin-top:16px;">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">🔥</span>
                        <div>
                            <div class="synthese-section-title">Gemeinsame Bedürfnisse</div>
                            <div class="synthese-section-subtitle">Resonanz & Übereinstimmung</div>
                        </div>
                    </div>
                    <div class="osho-zen-content">${oshoContent}</div>
                </div>`;
            } else if (!state.hasPartner) {
                resonanzHtml = `<div class="synthese-section" style="margin-top:16px;">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">🔥</span>
                        <div><div class="synthese-section-title">Gemeinsame Bedürfnisse</div></div>
                    </div>
                    <div style="text-align:center;padding:32px 20px;color:var(--text-muted);">
                        <div style="font-size:32px;margin-bottom:10px;">🔥</div>
                        <p style="font-size:13px;">Kein Partner ausgewählt — wähle einen Partner-Archetypen auf der Hauptseite.</p>
                    </div>
                </div>`;
            }

            try {
                container.innerHTML = top5Html
                    + `<div id="uebersicht-lower-section">${breakdownHtml}</div>`
                    + resonanzHtml;
            } catch(e) {
                // Fallback ohne Katalog
                container.innerHTML = `
                    <div class="synthese-section">
                        <div class="synthese-section-header">
                            <span class="synthese-section-icon">🎯</span>
                            <div><div class="synthese-section-title">ICH: ${names[state.ichArchetype] || state.ichArchetype}</div></div>
                        </div>
                        ${generateNeedsBreakdownHTML(state.ichArchetype, 'ich')}
                    </div>`;
            }
        }

        // Image mapping for Top-5 section: needId → filenames per variant
        var TOP5_IMAGE_MAP = {
            '#B1':  ['B002.webp','B005.webp'],
            '#B2':  ['B011.webp','B012.webp'],
            '#B3':  ['B014.webp','B006.webp','B047.webp'],
            '#B4':  ['B057.webp','B055.webp','B054.webp'],
            '#B5':  ['B060.webp','B058.webp','B056.webp'],
            '#B6':  ['B034.webp','B036.webp','B035.webp'],
            '#B7':  ['B082.webp','B048.webp','B007.webp'],
            '#B8':  ['Future/Firefly_Gemini Flash_Etwas futuristischer möglich - 523487 (1).png','B065.webp'],
            '#B9':  ['B041.webp','B042.webp','B039.webp'],
            '#B10': ['B017.webp','B044.webp','B045.webp'],
            '#B11': ['B119.webp','B120.webp'],
            '#B12': ['B021.webp','B020.webp','B028.webp'],
            '#B13': ['B072.webp','B175.webp'],
            '#B14': ['B062.webp','B070.webp','B063.webp'],
            '#B15': ['B052.webp','B050.webp','B051.webp'],
            '#B16': ['B064.webp','B067.webp','B069.webp']
        };
        var IMG_BASE_UEBERSICHT = 'assets/images/beduerfnisse-v2/';

        var _U_FARBEN  = { 1: '#10B981', 2: '#3B82F6', 3: '#8B5CF6', 4: '#F59E0B' };
        var _U_TRAD    = [
            { key: 'christentum', icon: '✝',  label: 'Christentum',     col: '#C9B99A' },
            { key: 'buddhismus',  icon: '☸',  label: 'Buddhismus',      col: '#A3C4BC' },
            { key: 'islam',       icon: '☪',  label: 'Islam / Sufismus', col: '#B5C9A0' },
            { key: 'osho',        icon: '✨', label: 'Osho',            col: '#D4A8D0' },
            { key: 'moderne',     icon: '🧬', label: 'Moderne',         col: '#A0B5C9' },
            { key: 'pirsig',      icon: '⚙',  label: 'Pirsig · Qualität', col: '#E8C97A' }
        ];
        var _U_activeNeedId  = null;
        var _U_breakdownHtml = '';

        window.toggleUebersichtWisdom = function(needId, value) {
            var section = document.getElementById('uebersicht-lower-section');
            if (!section) return;

            // Alle Karten-Borders zurücksetzen
            document.querySelectorAll('[id^="u-top5-card-"]').forEach(function(el) {
                el.style.border = '1px solid rgba(255,255,255,0.08)';
                el.style.boxShadow = '';
            });

            // Gleiche Karte nochmal → zurück zur Aufschlüsselung
            if (_U_activeNeedId === needId) {
                _U_activeNeedId = null;
                section.innerHTML = _U_breakdownHtml;
                return;
            }
            _U_activeNeedId = needId;

            // Aktive Karte hervorheben
            var need = (typeof BeduerfnisIds !== 'undefined') ? BeduerfnisIds.get(needId) : null;
            var color = need ? (_U_FARBEN[need.stufe] || '#888') : '#888';
            var safeKey = needId.replace('#', '');
            var activeCard = document.getElementById('u-top5-card-' + safeKey);
            if (activeCard) {
                activeCard.style.border = '2px solid ' + color;
                activeCard.style.boxShadow = '0 0 10px ' + color + '44';
            }

            // Ladeindikator
            section.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,255,255,0.3);font-size:13px;">🧬 Lade Tiage-Weisheit…</div>';

            if (typeof OshoZenTextGenerator === 'undefined' || typeof OshoZenTextGenerator.loadAndGetBeduerfnisData !== 'function') {
                section.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,200,100,0.5);font-size:12px;">OshoZenTextGenerator nicht verfügbar.</div>';
                return;
            }

            var variantKey = value <= 33 ? 'V1' : value <= 66 ? 'V2' : 'V3';
            var STUFEN_LABELS = { 1: 'Fundament', 2: 'Entfaltung', 3: 'Verbundenheit', 4: 'Sinn' };

            OshoZenTextGenerator.loadAndGetBeduerfnisData(needId).then(function(bedData) {
                if (_U_activeNeedId !== needId) return;
                if (!bedData) { section.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,200,100,0.5);font-size:12px;">Kein Text verfügbar.</div>'; return; }

                var varianten = bedData.varianten || {};
                var v = varianten[variantKey] || varianten['V1'] || Object.values(varianten)[0];
                if (!v) { section.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,200,100,0.5);font-size:12px;">Kein Text verfügbar.</div>'; return; }

                var trad = v.traditionen || {};
                var kartenName = v.karte_de || v.karte || variantKey;

                var bildSrc = '';
                if (v.bild) {
                    bildSrc = v.bild.startsWith('Future/') ? 'assets/images/' + v.bild : 'assets/images/beduerfnisse-v2/' + v.bild;
                }

                var html = '<div class="synthese-section" style="animation:fadeIn 0.25s ease;">'
                    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.07);">'
                    +   '<div style="display:flex;align-items:center;gap:8px;">'
                    +     (need && need.stufe ? '<span style="font-size:10px;font-weight:600;color:' + color + ';background:' + color + '22;padding:2px 8px;border-radius:4px;">' + (STUFEN_LABELS[need.stufe] || '') + '</span>' : '')
                    +     '<span style="font-size:14px;font-weight:700;color:#fff;">' + (need ? need.label : needId) + '</span>'
                    +     '<span style="font-size:10px;color:rgba(255,255,255,0.3);">· ' + kartenName + ' (' + variantKey + ')</span>'
                    +   '</div>'
                    +   '<button onclick="toggleUebersichtWisdom(\'' + needId + '\',' + value + ')" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;" title="Zurück zur Aufschlüsselung">×</button>'
                    + '</div>';

                if (bildSrc) {
                    html += '<div style="text-align:center;margin-bottom:16px;">'
                          +   '<img src="' + bildSrc + '" alt="' + kartenName + '" onclick="openLightbox(this.src,\'' + kartenName.replace(/'/g, "\\'") + '\')" style="max-height:260px;max-width:100%;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,0.5);object-fit:contain;cursor:zoom-in;">'
                          +   '<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:6px;letter-spacing:0.5px;">' + kartenName + ' · zum Vergrößern klicken</div>'
                          + '</div>';
                }

                if (v.tiage) {
                    html += '<div style="font-size:13px;color:rgba(255,255,255,0.78);font-style:italic;margin-bottom:14px;padding:10px 14px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:3px solid ' + color + ';line-height:1.6;">' + v.tiage + '</div>';
                }

                html += '<div style="font-size:10px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;">Weisheitstraditionen</div>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px;">';
                _U_TRAD.forEach(function(t) {
                    if (!trad[t.key]) return;
                    html += '<div style="background:rgba(255,255,255,0.02);border-radius:6px;padding:8px 10px;">'
                          +   '<div style="font-size:11px;font-weight:600;color:' + t.col + ';margin-bottom:4px;">' + t.icon + ' ' + t.label + '</div>'
                          +   '<div style="font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;">' + trad[t.key] + '</div>'
                          + '</div>';
                });
                html += '</div>';

                if (v.reflexion) {
                    html += '<div style="background:rgba(245,158,11,0.07);border-radius:7px;padding:10px 14px;border-left:3px solid #F59E0B;">'
                          +   '<div style="font-size:10px;color:#F59E0B;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">💡 Reflexion</div>'
                          +   '<div style="font-size:13px;color:rgba(255,255,255,0.85);font-style:italic;">' + v.reflexion + '</div>'
                          + '</div>';
                }

                html += '</div>';
                section.innerHTML = html;
            }).catch(function() {
                if (section) section.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,200,100,0.5);font-size:12px;">Texte konnten nicht geladen werden.</div>';
            });
        };

        function renderTop5SectionUebersicht(ichNeeds, ichArchetype) {
            var catalog = window.BeduerfnisIds && window.BeduerfnisIds.beduerfnisse;
            if (!catalog) return '';

            var ARCHETYPE_NAMES_MAP = {
                'single':'SingleProfil','duo':'DuoProfil','duo_flex':'DuoFlexProfil',
                'solopoly':'SolopolyProfil','polyamor':'PolyamorProfil',
                'ra':'RAProfil','lat':'LATProfil','aromantisch':'AromantischProfil'
            };
            var profName = ARCHETYPE_NAMES_MAP[ichArchetype];
            var baseProfil = profName && window[profName] ? (window[profName].umfrageWerte || window[profName].beduerfnisse) : null;

            var needsList = Object.keys(catalog).map(function(needId) {
                var val = ichNeeds && ichNeeds[needId] !== undefined ? ichNeeds[needId]
                        : baseProfil ? baseProfil[needId] : 50;
                if (val === undefined) val = 50;
                return { id: needId, label: catalog[needId].label, value: val,
                         stufe: catalog[needId].stufe, icon: catalog[needId].icon };
            });
            needsList.sort(function(a, b) { return b.value - a.value; });
            var top5 = needsList.slice(0, 5);

            var cardsHtml = top5.map(function(n) {
                var variants = TOP5_IMAGE_MAP[n.id];
                var idx = n.value <= 33 ? 0 : n.value <= 66 ? 1 : 2;
                var imgFile = variants ? variants[Math.min(idx, variants.length - 1)] : null;
                var imgSrc = imgFile ? (imgFile.startsWith('Future/') ? 'assets/images/' + imgFile : IMG_BASE_UEBERSICHT + imgFile) : null;
                var color = _U_FARBEN[n.stufe] || '#888';
                var safeKey = n.id.replace('#', '');
                var imgHtml = imgSrc
                    ? '<img src="' + imgSrc + '" alt="' + n.label + '" loading="lazy" style="width:100%;height:80px;object-fit:cover;border-radius:6px 6px 0 0;">'
                    : '<div style="width:100%;height:80px;background:rgba(255,255,255,0.05);border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:28px;">' + (n.icon || '⭐') + '</div>';
                return '<div id="u-top5-card-' + safeKey + '" onclick="toggleUebersichtWisdom(\'' + n.id + '\',' + n.value + ')" style="flex:1;min-width:0;background:rgba(20,20,30,0.8);border:1px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;cursor:pointer;transition:border 0.2s,box-shadow 0.2s;" title="Klick: Tiage-Weisheit anzeigen">'
                    + imgHtml
                    + '<div style="padding:6px 8px;">'
                    +   '<div style="font-size:10px;font-weight:700;color:' + color + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + n.label + '</div>'
                    +   '<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);">' + Math.round(n.value) + '</div>'
                    + '</div>'
                    + '</div>';
            }).join('');

            return '<div style="background:var(--bg-card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border);">'
                + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);">'
                +   '<span style="font-size:20px;">⭐</span>'
                +   '<div>'
                +     '<div style="font-size:15px;font-weight:600;color:var(--text-primary);">Top-5 Bedürfnisse</div>'
                +     '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;">Karte anklicken für Tiage-Weisheit</div>'
                +   '</div>'
                + '</div>'
                + '<div style="display:flex;gap:8px;">' + cardsHtml + '</div>'
                + '</div>';
        }

        /**
         * Berechnet den Score aus SSOT (ArchetypeMatrixCalculator)
         */
        function calculateScore() {
            const state = SynthesePageShared.getCurrentState();
            // SSOT: Use ArchetypeMatrixCalculator.getScore()
            if (typeof TiageSynthesis !== 'undefined' &&
                TiageSynthesis.ArchetypeMatrixCalculator &&
                typeof TiageSynthesis.ArchetypeMatrixCalculator.getScore === 'function') {
                const score = TiageSynthesis.ArchetypeMatrixCalculator.getScore(
                    state.ichArchetype,
                    state.partnerArchetype
                );
                if (score !== null && score !== undefined) {
                    return Math.round(score);
                }
            }
            // Fallback: Neutral default wenn SSOT nicht verfügbar
            return 50;
        }
    </script>

    <!-- Lightbox Overlay -->
    <div id="tiage-lightbox" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);cursor:zoom-out;align-items:center;justify-content:center;">
        <button onclick="closeLightbox();event.stopPropagation();" style="position:absolute;top:16px;right:20px;z-index:10;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);border-radius:50%;color:#fff;font-size:22px;cursor:pointer;line-height:1;width:38px;height:38px;display:flex;align-items:center;justify-content:center;">✕</button>
        <img id="tiage-lightbox-img" src="" alt="" style="max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.8);">
        <div id="tiage-lightbox-caption" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:13px;white-space:nowrap;"></div>
    </div>
    <script>
        function openLightbox(src, caption) {
            var lb = document.getElementById('tiage-lightbox');
            document.getElementById('tiage-lightbox-img').src = src;
            document.getElementById('tiage-lightbox-caption').textContent = caption || '';
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('tiage-lightbox').style.display = 'none';
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
