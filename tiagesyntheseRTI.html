    <style>
        .synthese-page {
            min-height: 100vh;
            background: var(--bg-dark);
            padding: 0;
        }

        .synthese-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(30, 30, 45, 0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .synthese-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .synthese-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .synthese-back:hover {
            background: rgba(255,255,255,0.1);
        }

        .synthese-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .synthese-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .synthese-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 18px;
        }

        .synthese-tab:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .synthese-tab.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8B5CF6;
            color: var(--text-primary);
        }

        /* Fire tab blink animation */
        @keyframes fireBlink {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 100, 0, 0.6), 0 0 10px rgba(255, 50, 0, 0.4);
                background: rgba(255, 100, 0, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 15px rgba(255, 100, 0, 1), 0 0 30px rgba(255, 50, 0, 0.8), 0 0 45px rgba(255, 150, 0, 0.5);
                background: rgba(255, 100, 0, 0.6);
                transform: scale(1.2);
            }
        }

        .synthese-tab.fire-blink {
            animation: fireBlink 0.6s ease-in-out 4;
        }

        .synthese-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 24px;
            transition: color 0.2s;
        }

        .synthese-close:hover {
            color: var(--text-primary);
        }

        .synthese-archetype-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }

        .archetype-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .archetype-nav-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .archetype-nav-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .archetype-info {
            text-align: center;
            min-width: 100px;
        }

        .archetype-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .archetype-label.ich {
            color: var(--success);
        }

        .archetype-label.partner {
            color: var(--danger);
        }

        .archetype-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .archetype-separator {
            font-size: 18px;
            color: var(--text-muted);
        }

        .synthese-content {
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .synthese-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .synthese-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .synthese-section-icon {
            font-size: 24px;
        }

        .synthese-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .synthese-section-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* RTI Pillar Styles - Redesigned */
        .rti-pillar-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .rti-pillar-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
            position: relative;
        }

        .rti-pillar-card:hover {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.12);
        }

        .rti-pillar-card.s1 .rti-pillar-question { color: #E84393; }
        .rti-pillar-card.s2 .rti-pillar-question { color: #3B82F6; }
        .rti-pillar-card.s3 .rti-pillar-question { color: #22c55e; }
        .rti-pillar-card.s4 .rti-pillar-question { color: #f59e0b; }
        .rti-pillar-card.s5 .rti-pillar-question { color: #8b5cf6; }

        /* Question Header */
        .rti-pillar-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .rti-pillar-title-area {
            flex: 1;
        }

        .rti-pillar-question {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .rti-pillar-subtitle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .rti-pillar-icon {
            font-size: 16px;
        }

        .rti-pillar-id {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
        }

        .rti-pillar-id.s1 { color: #E84393; }
        .rti-pillar-id.s2 { color: #3B82F6; }
        .rti-pillar-id.s3 { color: #22c55e; }
        .rti-pillar-id.s4 { color: #f59e0b; }
        .rti-pillar-id.s5 { color: #8b5cf6; }

        .rti-pillar-info-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rti-pillar-info-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8B5CF6;
            color: #8B5CF6;
        }

        /* Related Needs Tags */
        .rti-related-needs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .rti-need-tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .rti-need-tag:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
        }

        /* Comparison Bars - like Bedürfnis-Detail modal */
        .rti-comparison {
            margin-bottom: 16px;
        }

        .rti-comparison-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .rti-comparison-label {
            width: 65px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .rti-comparison-label.ich { color: var(--success); }
        .rti-comparison-label.partner { color: var(--danger); }

        .rti-bar-container {
            flex: 1;
            height: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .rti-bar {
            height: 100%;
            border-radius: 6px;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
        }

        .rti-bar.ich {
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.4), rgba(34, 197, 94, 0.7));
        }

        .rti-bar.partner {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.4), rgba(239, 68, 68, 0.7));
        }

        .rti-bar-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Difference / Resonance Display */
        .rti-resonance {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .rti-resonance-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .rti-resonance-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rti-resonance-value {
            font-size: 14px;
            font-weight: 700;
        }

        .rti-resonance-value.high { color: #22c55e; }
        .rti-resonance-value.medium { color: #f59e0b; }
        .rti-resonance-value.low { color: #ef4444; }

        .rti-resonance-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .rti-resonance-text em {
            color: var(--text-primary);
            font-style: normal;
            font-weight: 500;
        }

        /* Priority Toggle */
        .rti-pillar-priority {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rti-priority-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .rti-priority-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .rti-priority-btn.active {
            background: rgba(139, 92, 246, 0.4);
            border-color: #8B5CF6;
            color: var(--text-primary);
        }

        /* Footer with Priority */
        .rti-pillar-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .rti-priority-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .rti-priority-value {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary, #a78bfa);
            background: rgba(139, 92, 246, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Loading */
        .synthese-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .synthese-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Info Box */
        .rti-info-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .rti-info-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rti-info-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .rti-pillar-card {
                padding: 16px;
            }

            .rti-pillar-question {
                font-size: 14px;
            }

            .rti-pillar-header {
                flex-direction: column;
                gap: 10px;
            }

            .rti-pillar-info-btn {
                position: absolute;
                right: 16px;
                top: 16px;
            }

            .rti-comparison-label {
                width: 55px;
                font-size: 10px;
            }

            .rti-bar-container {
                height: 22px;
            }

            .rti-resonance-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .rti-pillar-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }

        /* RTI Info Modal */
        .rti-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .rti-modal-overlay.active {
            display: flex;
        }

        .rti-modal {
            background: linear-gradient(145deg, #1a1a2e 0%, #16162a 100%);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .rti-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            background: linear-gradient(145deg, #1a1a2e 0%, #16162a 100%);
            z-index: 10;
        }

        .rti-modal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .rti-modal-title-icon {
            font-size: 24px;
        }

        .rti-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .rti-modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }

        .rti-modal-body {
            padding: 24px;
        }

        .rti-modal-section {
            margin-bottom: 24px;
        }

        .rti-modal-section:last-child {
            margin-bottom: 0;
        }

        .rti-modal-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #8B5CF6;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rti-modal-section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #8B5CF6;
            border-radius: 2px;
        }

        .rti-modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .rti-modal-text strong {
            color: var(--text-primary);
        }

        .rti-modal-text p {
            margin: 0 0 12px 0;
        }

        .rti-modal-text p:last-child {
            margin-bottom: 0;
        }

        .rti-modal-quote {
            font-style: italic;
            padding: 12px 16px;
            background: rgba(139, 92, 246, 0.1);
            border-left: 3px solid #8B5CF6;
            border-radius: 0 8px 8px 0;
            margin-top: 12px;
            color: var(--text-secondary);
        }

        .rti-pillar-info-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
        }

        .rti-pillar-info-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8B5CF6;
            color: #8B5CF6;
        }
    </style>
</head>

    <div class="mobile-wip-blocker" style="display:none">

    <div class="synthese-page">

        <div class="synthese-header">
            <div class="synthese-header-left">
                <a href="javascript:history.back()" class="synthese-back" onclick="event.preventDefault(); window.location.href='archetype-interaction.html'">

        /**
         * Öffnet das RTI Info Modal für eine bestimmte Säule
         * @param {string} pillarId - 'S1', 'S2', 'S3', 'S4', oder 'S5'
         */
        function openRtiModal(pillarId) {
            const modal = document.getElementById('rtiInfoModal');
            const pillar = RTI_PILLARS.find(p => p.id === pillarId);
            const info = RTI_PILLAR_INFO[pillarId];

            if (!pillar || !info) return;

            // Header
            document.getElementById('rtiModalIcon').textContent = pillar.icon;
            document.getElementById('rtiModalTitle').textContent = `${pillarId}: ${info.title}`;

            // Allgemeine Info
            document.getElementById('rtiModalGeneral').innerHTML = RTI_PILLAR_INFO.general;

            // Spezifische Info
            document.getElementById('rtiModalSpecificTitle').textContent = info.title;
            document.getElementById('rtiModalSpecificText').innerHTML = info.text;

            // Quote (optional)
            const quoteEl = document.getElementById('rtiModalQuote');
            if (info.quote) {
                quoteEl.textContent = info.quote;
                quoteEl.style.display = 'block';
            } else {
                quoteEl.style.display = 'none';
            }

            // Modal anzeigen
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        /**
         * Schließt das RTI Info Modal
         * @param {Event} event - Optionales Click-Event (für Overlay-Klick)
         */
        function closeRtiModal(event) {
            // Wenn event vorhanden, nur schließen wenn auf Overlay geklickt
            if (event && event.target !== event.currentTarget) return;

            const modal = document.getElementById('rtiInfoModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        /**
         * Initialisierung via Shared Module
         */
        document.addEventListener('DOMContentLoaded', function() {
            SynthesePageShared.init({
                renderContent: renderContent,
                pageTitle: 'synthese.pageTitleRTI',
                extraSubscriptions: ['rtiPriorities']
            });

            // BeduerfnisIds laden (benötigt für Dimensions-Aggregation)
            if (typeof BeduerfnisIds !== 'undefined') {
                BeduerfnisIds.load();
            }

            // RTI Prioritäten laden
            if (typeof TiageState !== 'undefined') {
                const storedPriorities = TiageState.get('rtiPriorities');
                if (storedPriorities) {
                    rtiPriorities = { ...rtiPriorities, ...storedPriorities };
                }

                // RTI-spezifische Subscription
                TiageState.subscribe('rtiPriorities', function(newVal) {
                    if (newVal) {
                        rtiPriorities = { ...rtiPriorities, ...newVal };
                        renderContent();
                    }
                });
            }
        });

        /**
         * Setzt RTI Priorität
         */
        function setRtiPriority(pillar, value) {
            const numValue = Math.max(0, Math.min(2, parseInt(value) || 1));
            rtiPriorities[pillar] = numValue;

            // In TiageState speichern
            if (typeof TiageState !== 'undefined') {
                TiageState.set('rtiPriorities', { ...rtiPriorities });
                TiageState.saveToStorage();
            }

            renderContent();
        }

        /**
         * Aggregiert Bedürfnis-Level flatNeeds zu Dimensions-Durchschnitten (A-F)
         * Mapping: Bedürfnis → dimension (#D1-#D6) → Kurzform (A-F)
         */
        function aggregateByDimension(flatNeeds) {
            const dimMap = { '#D1': 'A', '#D2': 'B', '#D3': 'C', '#D4': 'D', '#D5': 'E', '#D6': 'F' };
            const sums = {};
            const counts = {};

            for (const key in flatNeeds) {
                if (!key || key.startsWith('_')) continue;
                const value = flatNeeds[key];
                if (typeof value !== 'number') continue;

                const need = BeduerfnisIds.get(key);
                if (!need || !need.dimension) continue;

                const letter = dimMap[need.dimension];
                if (!letter) continue;

                sums[letter] = (sums[letter] || 0) + value;
                counts[letter] = (counts[letter] || 0) + 1;
            }

            const result = {};
            ['A', 'B', 'C', 'D', 'E', 'F'].forEach(function(l) {
                result[l] = counts[l] > 0 ? Math.round(sums[l] / counts[l]) : 50;
            });
            return result;
        }

        /**
         * Berechnet RTI Säulen-Scores basierend auf Bedürfnis-Mappings
         * FIX v4.3: Aggregiert flatNeeds (#B-Keys) zu Dimensions-Scores (A-F)
         */
        function calculateRtiScores() {
            const scores = {
                ich: { S1: 50, S2: 50, S3: 50, S4: 50, S5: 50 },
                partner: { S1: 50, S2: 50, S3: 50, S4: 50, S5: 50 }
            };

            if (typeof TiageState === 'undefined') return scores;
            if (typeof BeduerfnisIds === 'undefined' || !BeduerfnisIds._loaded) return scores;

            // FIX v4.3: getFlatNeeds() statt get() — gibt flache Needs für aktuellen Archetyp zurück
            const ichNeeds = TiageState.getFlatNeeds ? TiageState.getFlatNeeds('ich') : {};
            const partnerNeeds = TiageState.getFlatNeeds ? TiageState.getFlatNeeds('partner') : {};

            // Bedürfnis-Mapping zu RTI Säulen (via Dimensions-Durchschnitte)
            // S1: C (Nähe-Distanz)
            // S2: (A × 0.6) + (F × 0.4) — Beziehungsphilosophie + Soziale-Kompatibilität
            // S3: D (Autonomie)
            // S4: (A × 0.4) + (F × 0.6) — Beziehungsphilosophie + Soziale-Kompatibilität
            // S5: (B × 0.4) + (E × 0.6) — Werte-Alignment + Kommunikation

            function calcScore(dims) {
                return {
                    S1: dims.C,
                    S2: Math.round((dims.A * 0.6) + (dims.F * 0.4)),
                    S3: dims.D,
                    S4: Math.round((dims.A * 0.4) + (dims.F * 0.6)),
                    S5: Math.round((dims.B * 0.4) + (dims.E * 0.6))
                };
            }

            const ichDims = aggregateByDimension(ichNeeds);
            const partnerDims = aggregateByDimension(partnerNeeds);

            scores.ich = calcScore(ichDims);
            scores.partner = calcScore(partnerDims);

            return scores;
        }

        /**
         * Kombiniert zwei Scores mit Similarity-Formel
         */
        function combineScores(a, b) {
            const min = Math.min(a, b);
            const max = Math.max(a, b);
            const similarity = max > 0 ? min / max : 1;
            return Math.round(((a + b) / 2) * similarity);
        }

        /**
         * Gibt CSS-Klasse basierend auf Score zurück
         */
        function getScoreClass(score) {
            if (score >= 70) return 'high';
            if (score <= 30) return 'low';
            return 'neutral';
        }

        /**
         * Ermittelt Resonanz-Level basierend auf Differenz
         */
        function getResonanceLevel(ichScore, partnerScore) {
            const diff = Math.abs(ichScore - partnerScore);
            if (diff <= 15) return 'high';
            if (diff <= 35) return 'medium';
            return 'low';
        }

                        </div>
                        <div class="rti-pillar-container">${ichPillarsHTML}</div>
                    </div>
                `;
                return;
            }

            let pillarsHTML = RTI_PILLARS.map(pillar => {
                const ichScore = scores.ich[pillar.id];
                const partnerScore = scores.partner[pillar.id];
                const combinedScore = combineScores(ichScore, partnerScore);

                    <div class="rti-pillar-card ${pillar.id.toLowerCase()}">
                        <div class="rti-pillar-header">
                            <div class="rti-pillar-title-area">
                                <div class="rti-pillar-question">${pillar.question}</div>

                                    <span class="rti-pillar-id ${pillar.id.toLowerCase()}">${pillar.id}</span>

                        <div class="rti-comparison">

                                <span class="rti-comparison-label ich">ICH</span>
                                <div class="rti-bar-container">
                                    <div class="rti-bar ich" style="width: ${ichScore}%"></div>
                                    <span class="rti-bar-value">${ichScore}%</span>
                                </div>
                            </div>
                            <div class="rti-comparison-row">
                                <span class="rti-comparison-label partner">PARTNER</span>
                                <div class="rti-bar-container">
                                    <div class="rti-bar partner" style="width: ${partnerScore}%"></div>
                                    <span class="rti-bar-value">${partnerScore}%</span>

                        <div class="rti-resonance">
                            <div class="rti-resonance-header">
                                <span class="rti-resonance-label">Resonanz</span>

                        <div class="rti-pillar-footer">
                            <span class="rti-priority-label">${t('synthese.prioritaetLabel', 'Priorität für dich:')}</span>
                            <span class="rti-priority-value" title="${priority === 0 ? t('synthese.gewichtungEgal', 'Egal') : priority === 2 ? t('synthese.gewichtungWichtig', 'Wichtig') : t('synthese.gewichtungNormal', 'Normal')}">${priority === 0 ? t('synthese.gewichtungEgal', 'Egal') : priority === 2 ? t('synthese.gewichtungWichtig', 'Wichtig') : t('synthese.gewichtungNormal', 'Normal')}</span>
                        </div>
                    </div>
                `;
            }).join('');

            const html = `
                <div class="synthese-section">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">⚡</span>
                        <div>
                            <div class="synthese-section-title">RTI Säulen der Identität</div>

                        </div>
                    </div>

                    <div class="rti-info-box">

                        <div class="rti-info-text">
                            Die 5 Säulen zeigen, wie eure Bedürfnisse in den wichtigsten Lebensbereichen übereinstimmen.
                            Die Balken vergleichen deine Werte (ICH) mit denen deines Partners.

                            <strong>Hohe Resonanz</strong> = Eure Werte sind ähnlich&nbsp;&nbsp;|&nbsp;&nbsp;

                        </div>
                    </div>

                    <div class="rti-pillar-container">
                        ${pillarsHTML}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }
    </script>
