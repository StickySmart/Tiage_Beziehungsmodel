    <script>
        // ═══════════════════════════════════════════════════════════════════════════
        // TIAGE SYNTHESE - Ti-Age Nuancen (Bedürfnisanalyse)
        // ═══════════════════════════════════════════════════════════════════════════

        // Archetypen-Liste für Navigation
        const archetypeOrder = ['single', 'duo', 'duoflex', 'solopoly', 'polyamor', 'ra', 'lat', 'aromantisch'];
        const archetypeNames = {
            'single': 'Single',
            'duo': 'Duo',
            'duoflex': 'Duo-Flex',
            'solopoly': 'Solopoly',
            'polyamor': 'Polyamor',
            'ra': 'RA',
            'lat': 'LAT',
            'aromantisch': 'Aromantisch'
        };

        let currentIchArchetype = 'duo';
        let currentPartnerArchetype = null;
        let hasPartner = false;
        let currentSortBy = 'diff'; // 'ich', 'partner', 'diff'
        let currentSortDir = 'desc';

        /**
         * Initialisierung
         */
        document.addEventListener('DOMContentLoaded', async function() {
            // Archetypen aus TiageState laden
            if (typeof TiageState !== 'undefined') {
                await TiageState.init();
                currentIchArchetype = TiageState.get('archetypes.ich.primary') || 'duo';
                const rawPartner = TiageState.get('archetypes.partner.primary');
                hasPartner = rawPartner != null;
                if (hasPartner) currentPartnerArchetype = rawPartner;

                // SSOT v4.3: flatNeeds und resonanzFaktoren werden von der Hauptseite berechnet
                // und über TiageState/localStorage persistiert. Synthese-Seiten LESEN nur.

                // SSOT: Reaktiv auf flatNeeds-Änderungen subscriben
                TiageState.subscribe('flatNeeds.ich', function() {
                    updateArchetypeDisplay();
                    renderContent();
                });
                TiageState.subscribe('flatNeeds.partner', function() {
                    updateArchetypeDisplay();
                    renderContent();
                });
                // Reagiere auf Partner-Auswahl von anderer Seite
                TiageState.subscribe('archetypes.partner', function() {
                    const raw = TiageState.get('archetypes.partner.primary');
                    hasPartner = raw != null;
                    if (hasPartner) currentPartnerArchetype = raw;
                    updatePartnerNavVisibility();
                    updateArchetypeDisplay();
                    renderContent();
                });
            }

            // Aus sessionStorage laden (nur als Fallback, wenn TiageState keine Daten hat)
            // TiageState ist SSOT - sessionStorage darf TiageState-Werte NICHT überschreiben
            const tiageStateHasIch = typeof TiageState !== 'undefined' &&
                TiageState.get('archetypes.ich.primary');

            if (!tiageStateHasIch) {
                const stored = sessionStorage.getItem('tiageSyntheseData');
                if (stored) {
                    try {
                        const data = JSON.parse(stored);
                        if (data.ichName) currentIchArchetype = findArchetypeKey(data.ichName);
                        if (data.partnerName) {
                            currentPartnerArchetype = findArchetypeKey(data.partnerName);
                            hasPartner = true;
                        }
                    } catch (e) {}
                }
            }

            updateArchetypeDisplay();
            updatePartnerNavVisibility();
            renderContent();
        });

        /**
         * Findet den Archetyp-Key anhand des Namens
         */
        function findArchetypeKey(name) {
            for (const [key, val] of Object.entries(archetypeNames)) {
                if (val.toLowerCase() === name.toLowerCase()) return key;
            }
            return name.toLowerCase().replace(/[^a-z]/g, '');
        }

        /**
         * Aktualisiert die Archetyp-Anzeige
         */
        function updateArchetypeDisplay() {
            document.getElementById('ichArchetypeName').textContent =
                archetypeNames[currentIchArchetype] || currentIchArchetype;
            document.getElementById('partnerArchetypeName').textContent =
                hasPartner ? (archetypeNames[currentPartnerArchetype] || currentPartnerArchetype) : '-';
        }

        function updatePartnerNavVisibility() {
            const selectors = document.querySelectorAll('.synthese-archetype-nav .archetype-selector');
            const separator = document.querySelector('.synthese-archetype-nav .archetype-separator');
            if (selectors[1]) selectors[1].style.display = hasPartner ? '' : 'none';
            if (separator) separator.style.display = hasPartner ? '' : 'none';
        }

        /**
         * Navigation zwischen Archetypen
         */
        function navigateArchetype(person, direction) {
            if (person === 'partner' && !hasPartner) return;
            const current = person === 'ich' ? currentIchArchetype : currentPartnerArchetype;
            const currentIndex = archetypeOrder.indexOf(current);
            let newIndex = currentIndex + direction;

            if (newIndex < 0) newIndex = archetypeOrder.length - 1;
            if (newIndex >= archetypeOrder.length) newIndex = 0;

            if (person === 'ich') {
                currentIchArchetype = archetypeOrder[newIndex];
                if (typeof TiageState !== 'undefined') {
                    TiageState.setArchetype('ich', currentIchArchetype);
                }
            } else {
                currentPartnerArchetype = archetypeOrder[newIndex];
                if (typeof TiageState !== 'undefined') {
                    TiageState.setArchetype('partner', currentPartnerArchetype);
                }
            }

            // Persist changes to localStorage for cross-page consistency
            if (typeof TiageState !== 'undefined' && TiageState.saveToStorage) {
                TiageState.saveToStorage();
            }

            updateArchetypeDisplay();
            renderContent();
        }

        /**
         * Sortierung ändern
         */
        function sortBy(column) {
            if (currentSortBy === column) {
                currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
            } else {
                currentSortBy = column;
                currentSortDir = 'desc';
            }
            renderContent();
        }

        /**
         * Öffnet die Detail-Seite für ein Bedürfnis
         */
        function openNeedDetail(needId) {
            window.location.href = 'tiagesynthese.html?need=' + encodeURIComponent(needId);
        }

        /**
         * Formatiert das Bedürfnis-Label
         */
        function formatLabel(needId) {
            if (typeof BeduerfnisKatalog !== 'undefined' && BeduerfnisKatalog.beduerfnisse[needId]) {
                return BeduerfnisKatalog.beduerfnisse[needId].label;
            }
            // Fallback: ID formatieren
            return needId.replace('#B', 'B').replace(/_/g, ' ');
        }

        /**
         * Prüft ob ein Bedürfnis angezeigt werden soll
         * v4.4: Bedürfnisse die nicht im Katalog existieren (B89-B125 entfernt) ausblenden
         * Nuancen nur für Feuer-Synthese, nicht hier
         */
        function shouldShowNeed(needId) {
            // BeduerfnisIds ist die primäre Quelle (beduerfnis-katalog.json)
            if (typeof BeduerfnisIds !== 'undefined' && BeduerfnisIds.beduerfnisse) {
                const need = BeduerfnisIds.beduerfnisse[needId];
                // Nicht im Katalog → ausblenden
                if (!need) return false;
                // Nuance → ausblenden (nur für Feuer-Synthese)
                if (need.frageTyp === 'nuance') return false;
            }
            // Fallback: BeduerfnisKatalog prüfen
            else if (typeof BeduerfnisKatalog !== 'undefined' && BeduerfnisKatalog.beduerfnisse) {
                const need = BeduerfnisKatalog.beduerfnisse[needId];
                if (!need) return false;
                if (need.frageTyp === 'nuance') return false;
            }
            return true;
        }

        /**
         * Rendert den Hauptinhalt - Hauptfragen mit Nuancen-Tags
         */
        function renderContent() {
            const container = document.getElementById('syntheseContent');

            // TiageState.flatNeeds = SINGLE SOURCE OF TRUTH (umfrageWerte + Modifikatoren)
            // FIX v4.3: getFlatNeeds() statt get() — gibt flache Needs für aktuellen Archetyp zurück
            const ichFlatNeeds = typeof TiageState !== 'undefined' && TiageState.getFlatNeeds ? TiageState.getFlatNeeds('ich') : null;
            const partnerFlatNeeds = typeof TiageState !== 'undefined' && TiageState.getFlatNeeds ? TiageState.getFlatNeeds('partner') : null;
            const hasIchProfile = ichFlatNeeds && Object.keys(ichFlatNeeds).length > 0;
            const hasPartnerProfile = partnerFlatNeeds && Object.keys(partnerFlatNeeds).length > 0;

            // Prüfen ob ICH-Profil geladen ist
            if (!hasIchProfile) {
                container.innerHTML = `
                    <div class="synthese-section">
                        <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                            <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                            <p style="font-size: 16px; margin-bottom: 8px;">ICH-Profil nicht geladen</p>
                            <p style="font-size: 13px; color: var(--text-muted); margin-top: 16px;">
                                Bitte stellen Sie sicher, dass das ICH-Profil vollständig ausgefüllt ist.
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            // Kein Partner → ICH-only Needs-Liste
            if (!hasPartner || !hasPartnerProfile) {
                let ichNeeds = [];
                Object.keys(ichFlatNeeds).forEach(needId => {
                    if (!shouldShowNeed(needId)) return;
                    ichNeeds.push({
                        id: needId,
                        label: formatLabel(needId),
                        value1: ichFlatNeeds[needId] || 0
                    });
                });
                ichNeeds.sort((a, b) => b.value1 - a.value1);

                let ichHtml = `
                    <div class="synthese-section">
                        <div class="synthese-section-header">
                            <span class="synthese-section-icon">💚</span>
                            <div>
                                <div class="synthese-section-title">Ti-Age Hauptfragen</div>
                                <div class="synthese-section-subtitle">Deine Bedürfnisse (ICH)</div>
                            </div>
                        </div>
                        <div style="text-align:center; padding: 16px; color: var(--text-muted);">
                            <p style="font-size:14px; margin-bottom:4px;">Kein Partner ausgewählt</p>
                            <p style="font-size:12px;">Wähle einen Partner-Archetypen auf der Hauptseite für den Vergleich.</p>
                        </div>
                `;
                ichNeeds.forEach(need => {
                    ichHtml += `
                        <div class="hauptfrage-item">
                            <div class="hauptfrage-row">
                                <div class="hauptfrage-left">
                                    <span class="hauptfrage-label">${need.label}</span>
                                    <span class="hauptfrage-id">${need.id}</span>
                                </div>
                                <div class="hauptfrage-values">
                                    <span class="need-value ich">${Math.round(need.value1)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                ichHtml += `</div>`;
                container.innerHTML = ichHtml;
                return;
            }

            // Alle einzelnen Bedürfnisse direkt vergleichen (ohne Konsolidierung)
            let needsComparison = [];
            let scoreValue = 0;

            // Alle Bedürfnis-IDs sammeln (Union beider Profile)
            const allNeedIds = new Set([
                ...Object.keys(ichFlatNeeds || {}),
                ...Object.keys(partnerFlatNeeds || {})
            ]);

            // Vergleichsdaten für jedes Bedürfnis erstellen (gewichtete Berechnung)
            // v4.4: Filter - nur Hauptfragen anzeigen, entfernte Bedürfnisse ausblenden
            let summeUebereinstimmung = 0;
            let summeGewicht = 0;
            allNeedIds.forEach(needId => {
                // v4.4: Überspringe entfernte Bedürfnisse (B89-B125) und Nuancen
                if (!shouldShowNeed(needId)) return;

                const ichValue = ichFlatNeeds[needId] || 0;
                const partnerValue = partnerFlatNeeds[needId] || 0;
                const diff = Math.abs(ichValue - partnerValue);

                // Gewicht: Durchschnitt beider Werte (höhere Werte = mehr Gewicht)
                const gewicht = (ichValue + partnerValue) / 2;

                // Ähnlichkeit: 100 - Differenz
                const aehnlichkeit = 100 - diff;

                // Gewichteter Beitrag
                summeUebereinstimmung += aehnlichkeit * gewicht;
                summeGewicht += gewicht;

                needsComparison.push({
                    id: needId,
                    label: formatLabel(needId),
                    value1: ichValue,
                    value2: partnerValue,
                    differenz: diff
                });
            });

            // Overall Match berechnen (gewichtete Übereinstimmung)
            if (summeGewicht > 0) {
                scoreValue = Math.round(summeUebereinstimmung / summeGewicht);
            }

            // Sortierung anwenden
            if (currentSortBy === 'ich') {
                needsComparison.sort((a, b) => {
                    return currentSortDir === 'desc' ? b.value1 - a.value1 : a.value1 - b.value1;
                });
            } else if (currentSortBy === 'partner') {
                needsComparison.sort((a, b) => {
                    return currentSortDir === 'desc' ? b.value2 - a.value2 : a.value2 - b.value2;
                });
            } else if (currentSortBy === 'diff') {
                needsComparison.sort((a, b) => {
                    return currentSortDir === 'desc' ? b.differenz - a.differenz : a.differenz - b.differenz;
                });
            }

            // Score-Farbe ermitteln
            let scoreColor = '#ef4444';
            if (scoreValue >= 80) {
                scoreColor = '#22c55e';
            } else if (scoreValue >= 60) {
                scoreColor = '#eab308';
            }

            // Matching-Daten in sessionStorage speichern für Modal-Zugriff
            // FIX: resonanceMap hinzufügen damit tiagesynthese.html die wert1/wert2 Werte anzeigen kann
            const resonanceMap = {};
            needsComparison.forEach(need => {
                resonanceMap[need.id] = {
                    wert1: need.value1,
                    wert2: need.value2
                };
            });
            sessionStorage.setItem('tiageSyntheseData', JSON.stringify({
                ichName: archetypeNames[currentIchArchetype] || currentIchArchetype,
                partnerName: archetypeNames[currentPartnerArchetype] || currentPartnerArchetype,
                resonanceMap: resonanceMap
            }));

            let html = `
                <div class="synthese-section">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">💚</span>
                        <div>
                            <div class="synthese-section-title">Ti-Age Hauptfragen</div>
                            <div class="synthese-section-subtitle">Resonanz → Kategorien → Nuancen</div>
                        </div>
                    </div>

                    <!-- Score Display -->
                    <div class="score-display">
                        <div class="score-value-large" style="color: ${scoreColor};">${scoreValue}%</div>
                        <div class="score-label">Bedürfnis-Übereinstimmung</div>
                    </div>

                    <!-- Sort Buttons -->
                    <div class="sort-buttons">
                        <button class="sort-btn ${currentSortBy === 'ich' ? 'active' : ''}" onclick="sortBy('ich')">
                            ICH ${currentSortBy === 'ich' ? (currentSortDir === 'desc' ? '↓' : '↑') : ''}
                        </button>
                        <button class="sort-btn ${currentSortBy === 'diff' ? 'active' : ''}" onclick="sortBy('diff')">
                            Differenz ${currentSortBy === 'diff' ? (currentSortDir === 'desc' ? '↓' : '↑') : ''}
                        </button>
                        <button class="sort-btn ${currentSortBy === 'partner' ? 'active' : ''}" onclick="sortBy('partner')">
                            PARTNER ${currentSortBy === 'partner' ? (currentSortDir === 'desc' ? '↓' : '↑') : ''}
                        </button>
                    </div>
            `;

            // Alle einzelnen Bedürfnisse anzeigen (ohne Konsolidierung)
            if (needsComparison.length > 0) {
                needsComparison.forEach(need => {
                    const diff = need.differenz || 0;
                    let diffClass = 'low';
                    if (diff > 30) diffClass = 'high';
                    else if (diff > 15) diffClass = 'medium';

                    html += `
                        <div class="hauptfrage-item">
                            <div class="hauptfrage-row" onclick="openNeedDetail('${need.id}')">
                                <div class="hauptfrage-left">
                                    <span class="hauptfrage-label">${need.label}</span>
                                    <span class="hauptfrage-id">${need.id}</span>
                                </div>
                                <div class="hauptfrage-values">
                                    <span class="need-value ich">${Math.round(need.value1)}</span>
                                    <span class="need-diff ${diffClass}">±${Math.round(diff)}</span>
                                    <span class="need-value partner">${Math.round(need.value2)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<p style="color: var(--text-muted); text-align: center;">Keine Bedürfnisse gefunden.</p>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
