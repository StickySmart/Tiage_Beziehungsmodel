    <script>
        const t = SynthesePageShared.t;

        // RTI Pillar Definitionen
        const RTI_PILLARS = {
            S1: { label: 'Leiblichkeit',     color: '#E63946' },
            S2: { label: 'Soziales Netz',    color: '#3B82F6' },
            S3: { label: 'Autonomie',        color: '#8B5CF6' },
            S4: { label: 'Sicherheit',       color: '#10B981' },
            S5: { label: 'Werte & Sinn',     color: '#F59E0B' }
        };

        // Stufen Definitionen mit RTI-Verbindungen
        const STUFEN_DEFS = [
            {
                key: 'S1', stufeNr: 1,
                label: 'Fundament',
                desc: 'Existenz · Sicherheit · Ruhe · Alltag',
                color: '#10B981',
                rtiPillars: ['S4'],
                rtiDesc: 'Basiert auf Sicherheit & Struktur (S4)'
            },
            {
                key: 'S2', stufeNr: 2,
                label: 'Entfaltung',
                desc: 'Freiheit · Ausdruck · Kink · Kommunikation',
                color: '#3B82F6',
                rtiPillars: ['S1', 'S3'],
                rtiDesc: 'Gespeist von Leiblichkeit (S1) und Autonomie (S3)'
            },
            {
                key: 'S3', stufeNr: 3,
                label: 'Verbundenheit',
                desc: 'Zuneigung · Intimität · Werte · Soziales',
                color: '#8B5CF6',
                rtiPillars: ['S2'],
                rtiDesc: 'Geprägt durch das Soziale Netz (S2)'
            },
            {
                key: 'S4', stufeNr: 4,
                label: 'Sinn',
                desc: 'Verständnis · Identität · Lebensplanung · Spiritualität',
                color: '#F59E0B',
                rtiPillars: ['S5', 'S3'],
                rtiDesc: 'Getragen von Werte & Sinn (S5) und Autonomie (S3)'
            }
        ];

        // Archetyp-Profil Mapping: bed.stufe wird direkt genutzt (16er-Modell)
        var ARCHETYPE_PROFIL_NAMES = {
            'single':      'SingleProfil',
            'duo':         'DuoProfil',
            'duo_flex':    'DuoFlexProfil',
            'solopoly':    'SolopolyProfil',
            'polyamor':    'PolyamorProfil',
            'ra':          'RAProfil',
            'lat':         'LATProfil',
            'aromantisch': 'AromantischProfil'
        };

        function getArchetypeBaseNeeds(archetype) {
            var name = ARCHETYPE_PROFIL_NAMES[archetype];
            if (!name) return null;
            var profil = window[name];
            // v5.0: profiles use umfrageWerte; fall back to beduerfnisse for legacy
            return (profil && profil.umfrageWerte) ? profil.umfrageWerte
                 : (profil && profil.beduerfnisse)  ? profil.beduerfnisse : null;
        }

        // Image mapping: needId → array of filenames (variant 0=primary, 1=medium, 2=high)
        var TOP5_IMAGE_MAP = {
            '#B1':  ['B002.webp','B005.webp'],
            '#B2':  ['B011.webp','B012.webp'],
            '#B3':  ['B014.webp','B006.webp','B047.webp'],
            '#B4':  ['B057.webp','B055.webp','B054.webp'],
            '#B5':  ['B060.webp','B058.webp','B056.webp'],
            '#B6':  ['B034.webp','B036.webp','B035.webp'],
            '#B7':  ['B082.webp','B048.webp','B007.webp'],
            '#B8':  ['B061.webp','B065.webp'],
            '#B9':  ['B041.webp','B042.webp','B039.webp'],
            '#B10': ['B017.webp','B044.webp','B045.webp'],
            '#B11': ['B119.webp','B120.webp'],
            '#B12': ['B021.webp','B020.webp','B028.webp'],
            '#B13': ['B072.webp','B175.webp'],
            '#B14': ['B062.webp','B070.webp','B063.webp'],
            '#B15': ['B052.webp','B050.webp','B051.webp'],
            '#B16': ['B064.webp','B067.webp','B069.webp']
        };
        var IMG_BASE = 'assets/images/beduerfnisse-v2/';

        function getImageVariant(needId, value) {
            var variants = TOP5_IMAGE_MAP[needId];
            if (!variants || variants.length === 0) return null;
            var idx = value <= 33 ? 0 : value <= 66 ? 1 : 2;
            return IMG_BASE + variants[Math.min(idx, variants.length - 1)];
        }

        function renderTop5Section(ichNeeds, ichArchetype) {
            var catalog = window.BeduerfnisIds && window.BeduerfnisIds.beduerfnisse;
            if (!catalog) return '';
            var STUFEN_FARBEN = { 1: '#10B981', 2: '#3B82F6', 3: '#8B5CF6', 4: '#F59E0B' };
            var baseNeeds = getArchetypeBaseNeeds(ichArchetype);

            var needsList = Object.keys(catalog).map(function(needId) {
                var val = ichNeeds[needId];
                if (val === undefined && baseNeeds) val = baseNeeds[needId];
                if (val === undefined) val = 50;
                return { id: needId, key: catalog[needId].key, label: catalog[needId].label, value: val,
                         stufe: catalog[needId].stufe, icon: catalog[needId].icon };
            });
            needsList.sort(function(a, b) { return b.value - a.value; });
            var top5 = needsList.slice(0, 5);

            var top5Ids = top5.map(function(n) { return n.id; });

            var cardsHtml = top5.map(function(n) {
                var imgSrc = getImageVariant(n.id, n.value);
                var color = STUFEN_FARBEN[n.stufe] || '#888';
                var safeKey = n.id.replace('#', '');
                var imgHtml = imgSrc
                    ? '<img src="' + imgSrc + '" alt="' + t('beduerfnisKatalog.needs.' + n.key, n.label) + '" loading="lazy" style="width:100%;height:80px;object-fit:cover;border-radius:6px 6px 0 0;pointer-events:none;">'
                    : '<div style="width:100%;height:80px;background:rgba(255,255,255,0.05);border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:28px;">' + (n.icon || '⭐') + '</div>';
                return '<div id="top5-card-' + safeKey + '" data-need-id="' + n.id + '" data-need-val="' + Math.round(n.value) + '" data-stufe-color="' + color + '"'
                    + ' style="flex:1;min-width:0;background:rgba(20,20,30,0.8);border:1.5px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;cursor:pointer;transition:border 0.2s,box-shadow 0.2s;" onclick="toggleEvoWisdom(\'' + n.id + '\',' + Math.round(n.value) + ')">'
                    + imgHtml
                    + '<div style="padding:6px 8px;">'
                    +   '<div style="font-size:10px;font-weight:700;color:' + color + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + t('beduerfnisKatalog.needs.' + n.key, n.label) + '</div>'
                    +   '<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);">' + Math.round(n.value) + '</div>'
                    + '</div>'
                    + '</div>';
            }).join('');

            return '<div style="background:var(--bg-card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border);">'
                + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);">'
                +   '<span style="font-size:20px;">⭐</span>'
                +   '<div>'
                +     '<div style="font-size:15px;font-weight:600;color:var(--text-primary);">' + t('synthese.top5Title', 'Top-5 Bedürfnisse') + '</div>'
                +     '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;">' + t('synthese.top5Subtitle', 'Klicke bis zu 5 mal das Bild um mehr zu erfahren') + '</div>'
                +   '</div>'
                + '</div>'
                + '<div id="evo-top5-cards" style="display:flex;gap:8px;">' + cardsHtml + '</div>'
                + '<div id="evo-lower-section" style="margin-top:12px;"></div>'
                + '</div>';
        }

        function toggleCard(stufeKey) {
            var card = document.getElementById('stufen-card-' + stufeKey);
            if (card) card.classList.toggle('open');
        }

        function getRtiValues() {
            if (typeof TiageWeights !== 'undefined' && TiageWeights.RTI) {
                return TiageWeights.RTI.get();
            }
            return { S1: 1, S2: 1, S3: 1, S4: 1, S5: 1 };
        }

        function rtiValueLabel(v) {
            return v === 0 ? t('synthese.gewichtungEgal', 'Egal') : v === 2 ? t('synthese.gewichtungWichtig', 'Wichtig') : t('synthese.gewichtungNormal', 'Normal');
        }

        /**
         * Collect top-N needs for a given Stufe number from the catalog (16er-Modell)
         */
        function getNeedsForStufe(stufeNr, ichArchetype, ichNeeds, topN) {
            var catalog = window.BeduerfnisIds && window.BeduerfnisIds.beduerfnisse;
            if (!catalog) return [];

            var baseNeeds = getArchetypeBaseNeeds(ichArchetype);
            var results = [];

            var lockedNeeds = (typeof TiageState !== 'undefined' && TiageState.get)
                ? (TiageState.get('profileReview.ich.global.lockedNeeds') || {}) : {};

            for (var needId in catalog) {
                if (!catalog.hasOwnProperty(needId)) continue;
                var bed = catalog[needId];
                if (!bed.stufe || bed.stufe !== stufeNr) continue;

                var expectedValue = baseNeeds ? baseNeeds[needId] : undefined;
                var actualValue = ichNeeds[needId];
                var displayExpected = expectedValue !== undefined ? expectedValue : (actualValue || 50);
                var delta = (actualValue !== undefined && expectedValue !== undefined) ? (actualValue - expectedValue) : null;

                results.push({
                    id: needId,
                    key: bed.key,
                    label: bed.label || needId,
                    expected: displayExpected,
                    actual: actualValue,
                    delta: delta,
                    isLocked: Object.prototype.hasOwnProperty.call(lockedNeeds, needId)
                });
            }

            // Sort by |delta| desc (most deviated first), then by actualValue desc
            results.sort(function(a, b) {
                var da = a.delta !== null ? Math.abs(a.delta) : 0;
                var db = b.delta !== null ? Math.abs(b.delta) : 0;
                if (da !== db) return db - da;
                return (b.actual || b.expected || 0) - (a.actual || a.expected || 0);
            });

            return results.slice(0, topN || 8);
        }

        function renderNeedsRows(needs, color, archetypeName) {
            if (!needs || needs.length === 0) {
                return '<div style="font-size:11px;color:rgba(255,255,255,0.3);padding:8px 0;">' + t('synthese.noNeedsInStufe', 'Keine Bedürfnisse in dieser Stufe gefunden') + '</div>';
            }
            return needs.map(function(n) {
                var val = n.actual !== undefined ? n.actual : n.expected;
                var barWidth = Math.min(100, Math.max(0, val));
                var deltaHtml = '';
                if (n.delta !== null) {
                    var d = Math.round(n.delta);
                    var sign = d > 0 ? '+' : '';
                    var dColor = d > 5 ? '#22C55E' : d < -5 ? '#EF4444' : 'rgba(255,255,255,0.3)';
                    var quality = d > 15 ? t('synthese.deltaVeryHigh', 'stark überdurchschnittlich')
                                : d > 5  ? t('synthese.deltaHigh', 'überdurchschnittlich')
                                : d < -15 ? t('synthese.deltaVeryLow', 'stark unterdurchschnittlich')
                                : d < -5  ? t('synthese.deltaLow', 'unterdurchschnittlich')
                                : t('synthese.deltaNormal', 'entspricht Archetyp-Norm');
                    var arcLabel = archetypeName || 'Archetyp';
                    var sourceLine = n.isLocked
                        ? t('synthese.sourceManual', '🔒 Von dir manuell gesetzt')
                        : t('synthese.sourceCalculated', '📐 Aus Profil berechnet&#10;   ({name} + G · D · O · FFH · RTI)').replace('{name}', arcLabel);
                    var tip = 'Du: ' + Math.round(val) + '  ·  ' + arcLabel + '-Ø: ' + Math.round(n.expected)
                            + '&#10;' + sign + d + ' → ' + quality
                            + '&#10;&#10;' + sourceLine;
                    deltaHtml = '<span class="stufen-need-delta" style="color:' + dColor + ';" data-tip="' + tip + '">'
                              + sign + d + '</span>';
                } else {
                    deltaHtml = '<span class="stufen-need-delta" style="color:rgba(255,255,255,0.2);">–</span>';
                }
                return '<div class="stufen-need-row">'
                    + '<span class="stufen-need-label">' + t('beduerfnisKatalog.needs.' + n.key, n.label) + '</span>'
                    + '<div class="stufen-need-bar-wrap"><div class="stufen-need-bar-fill" style="width:' + barWidth + '%;background:' + color + ';opacity:0.6;"></div></div>'
                    + '<span class="stufen-need-val">' + Math.round(val) + (n.actual !== undefined && n.expected !== undefined ? '<br><span style="font-size:9px;color:rgba(255,255,255,0.22);">Ø ' + Math.round(n.expected) + '</span>' : '') + '</span>'
                    + deltaHtml
                    + '</div>';
            }).join('');

        // ── 4-Mode cycling state ──────────────────────────────────────────────

        // ── 4-Mode cycling helpers ────────────────────────────────────────────

        function _evoResetCards() {

            var STUFEN_LABELS = { 1: t('beduerfnisKatalog.stufen.S1.label', 'Fundament'), 2: t('beduerfnisKatalog.stufen.S2.label', 'Entfaltung'), 3: t('beduerfnisKatalog.stufen.S3.label', 'Verbundenheit'), 4: t('beduerfnisKatalog.stufen.S4.label', 'Sinn') };

            // Varianten-Key ermitteln
            var varianten = bedData.varianten || {};

                _E_activeVariantKey = value <= 33 ? 'V1' : value <= 66 ? 'V2' : 'V3';
                if (!varianten[_E_activeVariantKey]) _E_activeVariantKey = variantKeys[0] || 'V1';
            }

            if (!v) { section.innerHTML = '<div style="color:rgba(255,200,100,0.6);font-size:12px;text-align:center;padding:10px;">' + t('synthese.noTextAvailable', 'Kein Text verfügbar.') + '</div>'; return; }

            var trad = v.traditionen || {};
            var kartenName = v.karte_de || v.karte || _E_activeVariantKey;

            var mode = _E_viewModes[_E_viewModeIdx] || 'bild';

            // Mode-dots HTML
            var modeDotsHtml = _E_viewModes.map(function(m, i) {
                return '<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:' + (i === _E_viewModeIdx ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.2)') + ';"></span>';
            }).join('');

            // Inject indicator into active card
            var oldInd = document.getElementById('evo-sticky-indicator');
            if (oldInd) oldInd.remove();
            var safeKey = needId.replace('#', '');
            var activeCardEl = document.getElementById('top5-card-' + safeKey);
            if (activeCardEl) {
                activeCardEl.style.overflow = 'visible';
                var arrowsHtml = '';
                if (hasMulti && mode === 'bild') {
                    var varIdx = variantKeys.indexOf(_E_activeVariantKey);
                    arrowsHtml = '<button onclick="_E_switchVariant(\'' + needId + '\',' + value + ',-1);event.stopPropagation();" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;padding:0 2px;line-height:1;">‹</button>'
                               + '<span style="font-size:9px;color:rgba(255,255,255,0.3);">' + (varIdx + 1) + '/' + variantKeys.length + '</span>'
                               + '<button onclick="_E_switchVariant(\'' + needId + '\',' + value + ',1);event.stopPropagation();" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;padding:0 2px;line-height:1;">›</button>';
                }
                activeCardEl.insertAdjacentHTML('beforeend',

                    + '<div style="display:flex;align-items:center;gap:4px;">'
                    +   '<span style="font-size:9px;color:rgba(255,255,255,0.45);">' + (modeLabels[mode] || mode) + '</span>'
                    +   '<span style="display:flex;gap:3px;align-items:center;">' + modeDotsHtml + '</span>'

                    + '<div onclick="event.stopPropagation();">' + arrowsHtml
                    +   '<button onclick="toggleEvoWisdom_close();event.stopPropagation();" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;" title="Schließen">×</button>'

            if (mode === 'bild') {

                if (!imgSrc) {

                    if (allImgs.length > 0) imgSrc = 'assets/images/beduerfnisse-v2/' + allImgs[0];

                html += '<div style="margin-top:10px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);">' + kartenName + '</div>';
                html += '</div>';
                section.innerHTML = html;

            } else if (mode === 'gemeinsam') {

                html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">' + t('synthese.viewWisheitHeader', '📖 Ti-Age Weisheit') + '</div>';
                if (v.tiage) {
                    html += '<div style="font-size:13px;color:rgba(255,255,255,0.8);font-style:italic;line-height:1.6;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:3px solid ' + color + ';">'
                          + v.tiage + '</div>';
                } else {
                    html += '<div style="font-size:12px;color:rgba(255,255,255,0.3);text-align:center;padding:20px 0;">' + t('synthese.noTextAvailable', 'Kein Text verfügbar.') + '</div>';
                }
                html += '</div>';
                section.innerHTML = html;

            } else if (mode === 'tradition') {
                var html = '<div class="synthese-section" style="animation:fadeIn 0.25s ease;">';
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">' + t('synthese.viewTraditionHeader', '🕊 Weisheitstraditionen') + '</div>';
                var hasTrad = false;
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:12px;">';
                TRAD_LIST.forEach(function(tradItem) {
                    if (!trad[tradItem.key]) return;
                    hasTrad = true;
                    html += '<div style="background:rgba(255,255,255,0.02);border-radius:6px;padding:8px 10px;">'
                          +   '<div style="font-size:11px;font-weight:600;color:' + tradItem.col + ';margin-bottom:4px;">' + tradItem.icon + ' ' + t('synthese.trad' + tradItem.key.charAt(0).toUpperCase() + tradItem.key.slice(1), tradItem.label) + '</div>'
                          +   '<div style="font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;">' + trad[tradItem.key] + '</div>'
                          + '</div>';
                });
                if (!hasTrad) html += '<div style="font-size:12px;color:rgba(255,255,255,0.3);padding:10px 0;">' + t('synthese.noTraditionsAvail', 'Keine Traditionen verfügbar') + '</div>';
                html += '</div>';
                if (v.reflexion) {
                    html += '<div style="background:rgba(245,158,11,0.07);border-radius:7px;padding:10px 14px;border-left:3px solid #F59E0B;">'
                          +   '<div style="font-size:10px;color:#F59E0B;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">💡 Reflexion</div>'
                          +   '<div style="font-size:13px;color:rgba(255,255,255,0.85);font-style:italic;">' + v.reflexion + '</div>'
                          + '</div>';
                }
                html += '</div>';
                section.innerHTML = html;

            } else {
                // karte mode: card name + large display
                var imgSrc = getImageVariant(needId, value);
                var html = '<div class="synthese-section" style="animation:fadeIn 0.25s ease;">';
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">🃏 Bedürfniskarte</div>';
                html += '<div style="display:flex;gap:14px;align-items:flex-start;">';
                if (imgSrc) {
                    html += '<img src="' + imgSrc + '" alt="' + kartenName + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;">';
                }
                html += '<div style="flex:1;">';
                if (need && need.stufe) {
                    html += '<div style="font-size:10px;font-weight:600;color:' + color + ';background:' + color + '22;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:6px;">' + (STUFEN_LABELS[need.stufe] || '') + '</div>';
                }
                html += '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">' + (need ? t('beduerfnisKatalog.needs.' + need.key, need.label) : needId) + '</div>';
                html += '<div style="font-size:12px;color:rgba(255,255,255,0.45);">' + kartenName + '</div>';
                html += '</div></div>';
                if (v.reflexion) {
                    html += '<div style="margin-top:12px;background:rgba(245,158,11,0.07);border-radius:7px;padding:10px 14px;border-left:3px solid #F59E0B;">'

                          + '</div>';
                }
                html += '</div>';
                section.innerHTML = html;

        window._E_switchVariant = function(needId, value, delta) {
            var bedData = _E_cachedBedData[needId];
            if (!bedData) return;
            var varianten = bedData.varianten || {};
            var variantKeys = Object.keys(varianten);
            if (variantKeys.length <= 1) return;
            var idx = variantKeys.indexOf(_E_activeVariantKey);
            idx = (idx + delta + variantKeys.length) % variantKeys.length;
            _E_activeVariantKey = variantKeys[idx];
            _E_renderLowerSection(needId, value, bedData);
        };

        window.toggleEvoWisdom_close = function() {
            _E_activeNeedId = null;
            _E_viewModeIdx  = 0;
            _E_activeVariantKey = null;
            _evoResetCards();
            var section = document.getElementById('evo-lower-section');
            if (section) section.innerHTML = '';
        };

        window.toggleEvoWisdom = function(needId, value) {
            _evoResetCards();

            // Same card → cycle
            if (_E_activeNeedId === needId) {
                _E_viewModeIdx = (_E_viewModeIdx + 1) % _E_viewModes.length;
                var cached = _E_cachedBedData[needId];
                if (cached) {
                    // Re-highlight card
                    var need2 = (typeof BeduerfnisIds !== 'undefined') ? BeduerfnisIds.get(needId) : null;
                    var color2 = need2 ? (STUFEN_FARBEN_CARD[need2.stufe] || '#888') : '#888';
                    var safeKey2 = needId.replace('#', '');
                    var activeCard2 = document.getElementById('top5-card-' + safeKey2);
                    if (activeCard2) { activeCard2.style.border = '1.5px solid ' + color2; activeCard2.style.boxShadow = '0 0 8px ' + color2 + '44'; }
                    _E_renderLowerSection(needId, value, cached);
                }
                return;
            }

            // Different card → open fresh
            _E_activeNeedId = needId;
            _E_viewModeIdx  = 0;
            _E_activeVariantKey = null;

            var need = (typeof BeduerfnisIds !== 'undefined') ? BeduerfnisIds.get(needId) : null;
            var color = need ? (STUFEN_FARBEN_CARD[need.stufe] || '#888') : '#888';
            var safeKey = needId.replace('#', '');
            var activeCard = document.getElementById('top5-card-' + safeKey);
            if (activeCard) { activeCard.style.border = '1.5px solid ' + color; activeCard.style.boxShadow = '0 0 8px ' + color + '44'; }

            var section = document.getElementById('evo-lower-section');
            if (section) section.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:12px;text-align:center;padding:10px 0;">' + t('synthese.loadingWisdom', '🧬 Lade Tiage-Weisheit…') + '</div>';

            if (typeof OshoZenTextGenerator === 'undefined') return;

            if (_E_cachedBedData[needId]) {
                _E_renderLowerSection(needId, value, _E_cachedBedData[needId]);
                return;
            }

            OshoZenTextGenerator.loadAndGetBeduerfnisData(needId).then(function(bedData) {
                if (_E_activeNeedId !== needId) return;
                if (!bedData) {
                    if (section) section.innerHTML = '<div style="color:rgba(255,200,100,0.6);font-size:12px;text-align:center;padding:10px;">' + t('synthese.noTextAvailable', 'Kein Text verfügbar.') + '</div>';
                    return;
                }
                _E_cachedBedData[needId] = bedData;
                _E_renderLowerSection(needId, value, bedData);
            }).catch(function() {
                if (section) section.innerHTML = '<div style="color:rgba(255,200,100,0.6);font-size:12px;text-align:center;padding:10px;">' + t('synthese.loadError', 'Texte konnten nicht geladen werden.') + '</div>';
            });
        };

        /**
         * Berechnet den Ø-Bedürfniswert (0-100) für eine Stufe (16er-Modell).
         */
        function calculateStufeAverage(stufeNr, needs, archetype) {
            var catalog = window.BeduerfnisIds && window.BeduerfnisIds.beduerfnisse;
            if (!catalog || Object.keys(catalog).length === 0) return null;
            var baseNeeds = getArchetypeBaseNeeds(archetype);
            var sum = 0, count = 0;
            for (var needId in catalog) {
                if (!catalog.hasOwnProperty(needId)) continue;
                var bed = catalog[needId];
                if (!bed.stufe || bed.stufe !== stufeNr) continue;
                var value = (needs && needs[needId] !== undefined) ? needs[needId]
                          : (baseNeeds ? baseNeeds[needId] : undefined);
                if (value !== undefined) { sum += value; count++; }
            }
            return count > 0 ? Math.round(sum / count) : null;
        }

        function renderContent() {
            var container = document.getElementById('syntheseContent');
            container.innerHTML = '<div class="synthese-loading"><div class="synthese-loading-spinner"></div><p>' + t('synthese.loadingKatalogShort', 'Lade Katalog...') + '</p></div>';

            var loadCatalog = (typeof BeduerfnisIds !== 'undefined' && BeduerfnisIds.load)
                ? BeduerfnisIds.load() : Promise.resolve();

            if (typeof window.loadRtiPriorities === 'function') {
                window.loadRtiPriorities();
            }

            loadCatalog.then(function() {
                var state = SynthesePageShared.getCurrentState();
                var ichArchetype = state.ichArchetype;
                var partnerArchetype = state.partnerArchetype;
                var hasPartner = state.hasPartner;

                var ichNeeds = (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds)
                    ? TiageState.getFlatNeeds('ich') : {};

                var partnerNeeds = {};
                if (hasPartner && partnerArchetype) {
                    partnerNeeds = (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds)
                        ? TiageState.getFlatNeeds('partner') : {};
                }

                var rti = getRtiValues();
                var archetypeNames = SynthesePageShared.archetypeNames;
                var ichLabel = archetypeNames[ichArchetype] || ichArchetype;

                // Build cards HTML
                var cardsHtml = STUFEN_DEFS.map(function(def) {
                    var ichVal = calculateStufeAverage(def.stufeNr, ichNeeds, ichArchetype);
                    var partnerVal = (hasPartner && Object.keys(partnerNeeds).length > 0)
                        ? calculateStufeAverage(def.stufeNr, partnerNeeds, partnerArchetype) : null;
                    var displayVal = (ichVal !== null && partnerVal !== null)
                        ? Math.round((ichVal + partnerVal) / 2)
                        : (ichVal !== null ? ichVal : 0);
                    var barWidth = Math.min(100, Math.max(0, displayVal));

                    // RTI badges
                    var rtiHtml = def.rtiPillars.map(function(pk) {
                        var pillar = RTI_PILLARS[pk];
                        var rtiVal = rti[pk];
                        var valLabel = rtiValueLabel(rtiVal);
                        return '<span class="stufen-rti-badge" style="color:' + pillar.color + ';border-color:' + pillar.color + ';">'
                            + pk + ' ' + t('synthese.rtiPillars.' + pk + '.name', pillar.label) + ' · ' + valLabel
                            + '</span>';
                    }).join('');

                    // Top needs for this Stufe
                    var topNeeds = getNeedsForStufe(def.stufeNr, ichArchetype, ichNeeds, 8);
                    var needsHtml = renderNeedsRows(topNeeds, def.color, ichLabel);

                    // Partner comparison row (if available)
                    var partnerRow = '';
                    if (partnerVal !== null) {
                        var pBar = Math.min(100, Math.max(0, partnerVal));
                        partnerRow = '<div style="display:flex;align-items:center;gap:10px;margin:8px 0 4px 0;">'
                            + '<span style="font-size:10px;color:var(--danger);font-weight:600;min-width:60px;">PARTNER</span>'
                            + '<div style="flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">'
                            + '<div style="height:100%;width:' + pBar + '%;background:' + def.color + ';border-radius:2px;opacity:0.5;"></div></div>'
                            + '<span style="font-size:11px;color:rgba(255,255,255,0.5);min-width:40px;text-align:right;">' + partnerVal + '</span>'
                            + '</div>';
                    }

                    return '<div class="stufen-card" id="stufen-card-' + def.key + '">'
                        + '<div class="stufen-card-header" onclick="toggleCard(\'' + def.key + '\')">'
                        +   '<span class="stufen-card-label" style="color:' + def.color + ';">' + t('beduerfnisKatalog.stufen.' + def.key + '.label', def.label) + '</span>'
                        +   '<div class="stufen-card-bar-wrap"><div class="stufen-card-bar-fill" style="width:' + barWidth + '%;background:' + def.color + ';"></div></div>'
                        +   '<span class="stufen-card-pct" style="color:' + def.color + ';">' + displayVal + '</span>'
                        +   '<span class="stufen-card-toggle">▶</span>'
                        + '</div>'
                        + '<div class="stufen-card-detail">'
                        +   '<div class="stufen-card-desc">' + t('synthese.stufenDesc.' + def.key, def.desc) + '</div>'
                        +   (partnerVal !== null ? partnerRow : '')
                        +   '<div class="stufen-section-rti">'
                        +     '<div class="stufen-section-rti-label">' + t('synthese.rtiVerbindung', 'RTI-Verbindung') + '</div>'
                        +     rtiHtml
                        +   '</div>'
                        +   '<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:8px;">' + t('synthese.stufenRtiDesc.' + def.key, def.rtiDesc) + '</div>'
                        +   '<div class="stufen-needs-list">'
                        +     '<div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">' + t('synthese.staerksteBeduerfnisse', 'Stärkste Bedürfnisse · {name}').replace('{name}', ichLabel) + '</div>'
                        +     needsHtml
                        +   '</div>'
                        + '</div>'
                        + '</div>';
                }).join('');

                var subtitle = hasPartner
                    ? t('synthese.stufenSubtitleBoth', 'ICH × PARTNER — Ø-Bedürfnisstärke je Stufe (0–100)')
                    : t('synthese.stufenSubtitleIch', 'DU — Bedürfnisstärke je Stufe (0–100)');

                var top5Html = renderTop5Section(ichNeeds, ichArchetype);

                container.innerHTML = top5Html
                    + '<div class="synthese-section">'
                    + '<div class="synthese-section-header">'
                    +   '<span class="synthese-section-icon">🧬</span>'
                    +   '<div>'
                    +     '<div class="synthese-section-title">' + t('synthese.evolutionTitle', 'Evolutionäre Bedürfnisstärke') + '</div>'
                    +     '<div class="synthese-section-subtitle">' + subtitle + '</div>'
                    +   '</div>'
                    + '</div>'
                    + cardsHtml
                    + '</div>';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            SynthesePageShared.init({
                renderContent: renderContent,
                pageTitle: 'synthese.pageTitleEvolution'
            });
        });
    </script>

    <!-- Lightbox Overlay -->
    <div id="tiage-lightbox" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);cursor:zoom-out;align-items:center;justify-content:center;">
        <button onclick="closeLightbox();event.stopPropagation();" style="position:absolute;top:16px;right:20px;z-index:10;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);border-radius:50%;color:#fff;font-size:22px;cursor:pointer;line-height:1;width:38px;height:38px;display:flex;align-items:center;justify-content:center;">✕</button>
        <img id="tiage-lightbox-img" src="" alt="" style="max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.8);">
        <div id="tiage-lightbox-caption" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:13px;white-space:nowrap;"></div>
    </div>
    <script>
        function openLightbox(src, caption) {
            var lb = document.getElementById('tiage-lightbox');
            document.getElementById('tiage-lightbox-img').src = src;
            document.getElementById('tiage-lightbox-caption').textContent = caption || '';
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('tiage-lightbox').style.display = 'none';
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
