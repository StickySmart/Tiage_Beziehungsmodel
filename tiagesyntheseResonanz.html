    <style>
        .synthese-page {
            min-height: 100vh;
            background: var(--bg-dark);
            padding: 0;
        }

        .synthese-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            background: rgba(30, 30, 45, 0.95);

        .synthese-header-left {

        .synthese-back {

            border: 1px solid var(--border);
            border-radius: 8px;

            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .synthese-back:hover {

        .synthese-title {

            font-size: 18px;

        /* Fire tab blink animation */
        @keyframes fireBlink {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 100, 0, 0.6), 0 0 10px rgba(255, 50, 0, 0.4);
                background: rgba(255, 100, 0, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 15px rgba(255, 100, 0, 1), 0 0 30px rgba(255, 50, 0, 0.8), 0 0 45px rgba(255, 150, 0, 0.5);
                background: rgba(255, 100, 0, 0.6);
                transform: scale(1.2);
            }

        .synthese-tab.fire-blink {
            animation: fireBlink 0.6s ease-in-out 4;
        }

        .synthese-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 24px;

        .synthese-close:hover {
            color: var(--text-primary);
        }

        .synthese-archetype-nav {

            justify-content: center;

            padding: 16px 20px;

        }

        .archetype-nav-btn {

            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);

            transition: all 0.2s;
        }

        .archetype-nav-btn:hover {

        .archetype-info {

        .archetype-label {

        }

        .archetype-label.partner {

        }

        .archetype-name {

        }

        .synthese-content {
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;

        .synthese-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;

            border: 1px solid var(--border);

        .synthese-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;

        }

        /* Loading */

        @keyframes spin {

        <!-- Content -->
        <div class="synthese-content" id="syntheseContent">
            <div class="synthese-loading">

                <p data-i18n="synthese.loadingResonanz">Lade Osho Zen Resonanz...</p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════════
        // TIAGE SYNTHESE RESONANZ - Osho Zen Gemeinsame Bedürfnisse
        // ═══════════════════════════════════════════════════════════════════════════

        // Shared code in synthesePageShared.js
        const t = SynthesePageShared.t;

        /**
         * Initialisierung via Shared Module
         */
        document.addEventListener('DOMContentLoaded', function() {
            SynthesePageShared.init({
                renderContent: renderContent,
                pageTitle: 'synthese.pageTitleResonanz'
            });
        });

        /**
         * Rendert den Hauptinhalt
         */
        async function renderContent() {
            const container = document.getElementById('syntheseContent');
            const { hasPartner, ichArchetype, partnerArchetype } = SynthesePageShared.getCurrentState();

            // Kein Partner ausgewählt → Platzhalter
            if (!hasPartner) {
                container.innerHTML = `
                    <div class="synthese-section">
                        <div class="synthese-section-header">
                            <span class="synthese-section-icon">🔥</span>
                            <div>
                                <div class="synthese-section-title">${t('synthese.resonanzTitle', 'Ti-Age Gemeinsame Bedürfnisse')}</div>
                                <div class="synthese-section-subtitle">${t('synthese.resonanzSubtitle', 'Resonanz & Übereinstimmung')}</div>
                            </div>
                        </div>
                        <div style="text-align:center; padding: 40px 20px; color: var(--text-muted);">
                            <div style="font-size:36px; margin-bottom:12px;">🔥</div>
                            <p style="font-size:14px; margin-bottom:8px;">${t('synthese.noPartnerSelected', 'Kein Partner ausgewählt')}</p>
                            <p style="font-size:12px;">${t('synthese.selectPartnerHintNeeds', 'Wähle einen Partner-Archetypen auf der Hauptseite um die gemeinsamen Bedürfnisse zu sehen.')}</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Prüfe ob OshoZenTextGenerator verfügbar ist
            if (typeof OshoZenTextGenerator === 'undefined') {
                container.innerHTML = `
                    <div class="synthese-section">
                        <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                            <div style="font-size: 48px; margin-bottom: 16px;">🔥</div>
                            <p>Osho Zen Modul wird geladen...</p>
                            <p style="font-size: 12px; margin-top: 8px;">
                                Bitte stelle sicher, dass oshoZenTextGenerator.js geladen ist.
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            // Daten laden falls nötig
            if (!OshoZenTextGenerator.isDataLoaded()) {
                container.innerHTML = `
                    <div class="synthese-loading">
                        <div class="synthese-loading-spinner"></div>
                        <p>${t('synthese.loadingOshoTexte', 'Lade Osho Zen Texte...')}</p>
                    </div>
                `;

                try {
                    await OshoZenTextGenerator.loadData();
                } catch (err) {
                    console.error('Fehler beim Laden der Osho Zen Daten:', err);
                    container.innerHTML = `
                        <div class="synthese-section">
                            <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                                <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                                <p>${t('synthese.errorOshoLoad', 'Fehler beim Laden der Osho Zen Daten.')}</p>
                            </div>
                        </div>
                    `;
                    return;
                }
            }

            // Profile mit Bedürfnisdaten erstellen
            // Priorität: 1. TiageState.flatNeeds, 2. BaseArchetypProfile.umfrageWerte
            let needs1 = {};
            let needs2 = {};

            // Bedürfnisse für ICH laden
            // FIX v4.3: getFlatNeeds() statt get() — gibt flache Needs für aktuellen Archetyp zurück
            if (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds) {
                needs1 = TiageState.getFlatNeeds('ich') || {};
            }
            // Fallback auf Basis-Archetyp-Werte wenn TiageState leer
            if (Object.keys(needs1).length === 0 && typeof BaseArchetypProfile !== 'undefined') {
                const baseProfil1 = BaseArchetypProfile[ichArchetype];
                if (baseProfil1 && baseProfil1.umfrageWerte) {
                    needs1 = baseProfil1.umfrageWerte;
                    console.log('[Resonanz] Fallback auf BaseArchetypProfile für ICH:', ichArchetype);
                }
            }

            // Bedürfnisse für PARTNER laden
            if (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds) {
                needs2 = TiageState.getFlatNeeds('partner') || {};
            }
            // Fallback auf Basis-Archetyp-Werte wenn TiageState leer
            if (Object.keys(needs2).length === 0 && typeof BaseArchetypProfile !== 'undefined') {
                const baseProfil2 = BaseArchetypProfile[partnerArchetype];
                if (baseProfil2 && baseProfil2.umfrageWerte) {
                    needs2 = baseProfil2.umfrageWerte;
                    console.log('[Resonanz] Fallback auf BaseArchetypProfile für PARTNER:', partnerArchetype);
                }
            }

            console.log('[Resonanz] Bedürfnisse geladen - ICH:', Object.keys(needs1).length, 'PARTNER:', Object.keys(needs2).length);

            // Profile mit Bedürfnissen erstellen
            const profile1 = {
                name: SynthesePageShared.archetypeNames[ichArchetype],
                needs: needs1,
                beduerfnisse: needs1
            };
            const profile2 = {
                name: SynthesePageShared.archetypeNames[partnerArchetype],
                needs: needs2,
                beduerfnisse: needs2
            };

            // Content generieren
            const oshoContent = OshoZenTextGenerator.generateSync({
                profile1: profile1,
                profile2: profile2,
                name1: SynthesePageShared.archetypeNames[ichArchetype],
                name2: SynthesePageShared.archetypeNames[partnerArchetype],
                topN: 5
            });

            let html = `
                <div class="synthese-section">
                    <div class="synthese-section-header">
                        <span class="synthese-section-icon">🔥</span>
                        <div>
                            <div class="synthese-section-title">${t('synthese.resonanzTitle', 'Ti-Age Gemeinsame Bedürfnisse')}</div>
                            <div class="synthese-section-subtitle">${t('synthese.resonanzSubtitle', 'Resonanz & Übereinstimmung')}</div>
                        </div>
                    </div>
                    <div class="osho-zen-content">
                        ${oshoContent}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }
    </script>
