<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homo Digitalis Button</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        a {
            text-decoration: none;
        }

        .heart-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            height: 200px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .heart-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .heart-button:active {
            transform: scale(0.95);
        }

        .heart-button svg {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }
    </style>
</head>
<body>
    <a href="https://soundcloud.com/homo_digitalis" target="_blank" class="heart-button" title="Homo Digitalis auf SoundCloud">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
            <defs>
                <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
                    <stop offset="16%" style="stop-color:#ff7f00;stop-opacity:1" />
                    <stop offset="33%" style="stop-color:#ffff00;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#00ff00;stop-opacity:1" />
                    <stop offset="66%" style="stop-color:#0000ff;stop-opacity:1" />
                    <stop offset="83%" style="stop-color:#4b0082;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#9400d3;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path d="M100,170 C25,130 10,90 10,70 C10,45 25,30 40,30 C55,30 70,45 100,70 C130,45 145,30 160,30 C175,30 190,45 190,70 C190,90 175,130 100,170 Z" 
                  fill="url(#rainbowGradient)" 
                  stroke="none"/>
        </svg>
    </a>
</body>
</html>
