name: Auto Version Bump on Merge

on:
  push:
    branches:
      - main

# Prevent concurrent version bumps
concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    # Skip if commit message contains [skip ci] to prevent infinite loops
    # Note: Use fallback to empty string for null-safety when head_commit.message is null (e.g., merge commits)
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Check if version was already bumped
        id: check_bump
        run: |
          # Prüfe ob package.json oder js/version.js im letzten Commit geändert wurden
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)

          if echo "$CHANGED_FILES" | grep -q "package.json"; then
            echo "Version already bumped by pre-commit hook"
            echo "already_bumped=true" >> $GITHUB_OUTPUT
            # Hole aktuelle Version aus package.json
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            echo "NEW_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          else
            echo "Version not bumped yet, will bump now"
            echo "already_bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version
        if: steps.check_bump.outputs.already_bumped == 'false'
        run: |
          # Run the version bump script
          node scripts/bump-version.js

          # Get the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and push version bump
        run: |
          # Wenn bereits gebumpt: nur Tag erstellen
          # Wenn nicht gebumpt: Commit + Tag erstellen

          if [ "${{ steps.check_bump.outputs.already_bumped }}" == "false" ]; then
            git add package.json js/version.js README.md

            # Only commit if there are changes
            if ! git diff --staged --quiet; then
              git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
            fi
          fi

          # Tag erstellen (immer, auch wenn pre-commit schon gebumpt hat)
          if ! git tag -l "v${{ env.NEW_VERSION }}" | grep -q .; then
            git tag -a "v${{ env.NEW_VERSION }}" -m "Version ${{ env.NEW_VERSION }}"
            echo "Created tag v${{ env.NEW_VERSION }}"
          fi

          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
