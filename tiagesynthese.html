    <script>
        // ═══════════════════════════════════════════════════════════════════════════
        // TIAGE SYNTHESE PAGE - SSOT RENDERING
        // Verwendet BeduerfnisKatalog als einzige Datenquelle
        // ═══════════════════════════════════════════════════════════════════════════

        /**
         * Hilfsfunktion: Perspektive für Kategorie ermitteln
         */
        function getPerspektiveForKategorie(katId) {
            const katNum = parseInt(katId.replace('#K', ''));
            if (katNum === 11) return '#P4';
            return '#P1';
        }

        /**
         * Rendert den Bedürfnis-Inhalt (SSOT - gleiche Logik wie Modal)
         */
        function renderNeedContent(needId, resonanceData) {
            const container = document.getElementById('syntheseContent');
            const pageTitle = document.getElementById('pageTitle');

            // Katalog prüfen
            const katalog = window.BeduerfnisKatalog;
            if (!katalog) {
                container.innerHTML = '<div class="synthese-error"><div class="synthese-error-icon">⚠️</div><p>Katalog nicht geladen.</p></div>';
                return;
            }

            // Need-ID ermitteln (kann #B-ID oder string-key sein)
            let bId = needId;
            if (needId && !needId.startsWith('#B') && typeof BeduerfnisIds !== 'undefined') {
                bId = BeduerfnisIds.toId(needId) || needId;
            }

            // Need aus Katalog holen
            const need = katalog.beduerfnisse[bId];
            if (!need) {
                container.innerHTML = '<div class="synthese-error"><div class="synthese-error-icon">❓</div><p>Bedürfnis "' + needId + '" nicht gefunden.</p></div>';
                return;
            }

            // Titel setzen
            pageTitle.textContent = need.label;
            document.title = need.label + ' | Ti-Age Synthese';

            // Kategorie, Dimension, Perspektive aus Katalog holen
            const kategorie = katalog.kategorien[need.kategorie];
            const dimension = katalog.dimensionen[need.dimension];
            const perspektive = kategorie ? katalog.perspektiven[getPerspektiveForKategorie(need.kategorie)] : null;

            // HTML aufbauen (SSOT - gleiche Struktur wie Modal)
            let html = '<div class="need-modal-content">';

            // ID Badge
            html += '\
                <div class="need-modal-id-row">\
                    <span class="need-modal-id">' + need.id + '</span>\
                    ' + (need.frageTyp ? '<span class="need-modal-type need-modal-type-' + need.frageTyp + '">' + (need.frageTyp === 'haupt' ? '📋 Hauptfrage' : '📑 Nuance') + '</span>' : '') + '\
                </div>\
            ';

            // Kategorie & Dimension
            html += '<div class="need-modal-meta-grid">';

            if (kategorie) {
                html += '\
                    <div class="need-modal-meta-item">\
                        <span class="need-modal-meta-label">Kategorie</span>\
                        <span class="need-modal-meta-value" style="color: ' + kategorie.color + '">\
                            <span class="need-modal-dot" style="background: ' + kategorie.color + '"></span>\
                            ' + kategorie.label + '\
                        </span>\
                    </div>\
                ';
            }

            if (dimension) {
                html += '\
                    <div class="need-modal-meta-item">\
                        <span class="need-modal-meta-label">Dimension</span>\
                        <span class="need-modal-meta-value" style="color: ' + dimension.color + '">\
                            <span class="need-modal-badge" style="background: ' + dimension.color + '">' + dimension.kurzform + '</span>\
                            ' + dimension.label + '\
                        </span>\
                    </div>\
                ';
            }

            if (perspektive) {
                html += '\
                    <div class="need-modal-meta-item">\
                        <span class="need-modal-meta-label">Perspektive</span>\
                        <span class="need-modal-meta-value">\
                            ' + perspektive.id + ' ' + perspektive.label + '\
                        </span>\
                    </div>\
                ';
            }

            html += '</div>';

            // Frage (wenn vorhanden)
            if (need.frage) {
                html += '\
                    <div class="need-modal-question">\
                        <span class="need-modal-question-icon">❓</span>\
                        <span class="need-modal-question-text">' + need.frage + '</span>\
                    </div>\
                ';
            }

            // Kontext (bei Nuancen)
            if (need.kontext) {
                html += '\
                    <div class="need-modal-context">\
                        <span class="need-modal-context-label">Kontext:</span>\
                        <span class="need-modal-context-text">' + need.kontext + '</span>\
                    </div>\
                ';
            }

            // Hauptbedürfnis-Referenz (bei Nuancen)
            if (need.hauptbeduerfnis) {
                const hauptNeed = katalog.beduerfnisse[need.hauptbeduerfnis];
                if (hauptNeed) {
                    html += '\
                        <div class="need-modal-parent">\
                            <span class="need-modal-parent-label">Gehört zu:</span>\
                            <a class="need-modal-parent-link" href="tiagesynthese.html?need=' + need.hauptbeduerfnis + '">' + hauptNeed.label + ' (' + need.hauptbeduerfnis + ')</a>\
                        </div>\
                    ';
                }
            }

            // Nuancen (bei Hauptfragen)
            if (need.nuancen && need.nuancen.length > 0) {
                html += '\
                    <div class="need-modal-nuancen">\
                        <span class="need-modal-nuancen-label">Nuancen:</span>\
                        <div class="need-modal-nuancen-list">\
                            ' + need.nuancen.map(function(nId) {
                                const n = katalog.beduerfnisse[nId];
                                return n ? '<a class="need-modal-nuance-tag" href="tiagesynthese.html?need=' + nId + '">' + n.label + '</a>' : '';
                            }).join('') + '\
                        </div>\
                    </div>\
                ';
            }

            // Ich + Partner + Differenz Karte (Tiagesynthese zeigt NUR den Vergleich beider Profile)
            const hasBothProfiles = resonanceData &&
                                    resonanceData.wert1 !== undefined &&
                                    resonanceData.wert2 !== undefined;

            if (hasBothProfiles) {
                const ichWert = resonanceData.wert1;
                const partnerWert = resonanceData.wert2;
                const differenz = ichWert - partnerWert;
                const absDifferenz = Math.abs(differenz);
                const diffClass = differenz > 0 ? 'positive' : (differenz < 0 ? 'negative' : 'neutral');

                html += '\
                    <div class="need-modal-comparison">\
                        <div class="need-modal-comparison-header">\
                            <span class="need-modal-comparison-icon">👥</span>\
                            <span class="need-modal-comparison-label">Werte-Vergleich</span>\
                        </div>\
                        <div class="need-modal-comparison-row">\
                            <span class="need-modal-comparison-name">' + (resonanceData.ichName || 'Ich') + '</span>\
                            <div class="need-modal-comparison-bar-container">\
                                <div class="need-modal-comparison-bar ich" style="width: ' + ichWert + '%"></div>\
                            </div>\
                            <span class="need-modal-comparison-value">' + ichWert + '</span>\
                        </div>\
                        <div class="need-modal-comparison-row">\
                            <span class="need-modal-comparison-name">' + (resonanceData.partnerName || 'Partner') + '</span>\
                            <div class="need-modal-comparison-bar-container">\
                                <div class="need-modal-comparison-bar partner" style="width: ' + partnerWert + '%"></div>\
                            </div>\
                            <span class="need-modal-comparison-value">' + partnerWert + '</span>\
                        </div>\
                        <div class="need-modal-comparison-diff">\
                            <span class="need-modal-comparison-diff-label">Differenz</span>\
                            <span class="need-modal-comparison-diff-value ' + diffClass + '">' + absDifferenz + '</span>\
                        </div>\
                    </div>\
                ';
            } else {
                // Warnung wenn nicht beide Profile geladen
                html += '\
                    <div class="need-modal-value" style="background: rgba(234, 179, 8, 0.08); border-color: rgba(234, 179, 8, 0.2);">\
                        <div style="display: flex; align-items: center; gap: 10px; color: var(--text-muted, #888);">\
                            <span style="font-size: 20px;">⚠️</span>\
                            <span style="font-size: 13px;">Für den Werte-Vergleich müssen beide Profile (Ich und Partner) geladen sein.</span>\
                        </div>\
                    </div>\
                ';
            }

            // Statistische Daten berechnen (80% Konfidenzintervall)
            const sigma = (kategorie && kategorie.sigma) || (typeof TiageStatistics !== 'undefined' ? TiageStatistics.DEFAULT_SIGMA : 14);

            // Typischen Wert aus Archetyp-Umfragedaten holen (statt hardcoded 50)
            let typicalValue = 50; // Fallback
            let archetypForStats = null;

            // 1. Versuche Archetyp aus TiageState zu holen
            if (typeof TiageState !== 'undefined') {
                archetypForStats = TiageState.get('archetypes.ich.primary');
            }
            // 2. Fallback: window.mobileIchArchetype
            if (!archetypForStats && typeof window.mobileIchArchetype !== 'undefined') {
                archetypForStats = window.mobileIchArchetype;
            }

            // 3. Hole typischen Wert aus BaseArchetypProfile
            if (archetypForStats && typeof window.BaseArchetypProfile !== 'undefined') {
                const baseProfil = window.BaseArchetypProfile[archetypForStats];
                if (baseProfil && baseProfil.umfrageWerte && baseProfil.umfrageWerte[needId] !== undefined) {
                    typicalValue = baseProfil.umfrageWerte[needId];
                }
            }

            if (typeof TiageStatistics !== 'undefined') {
                const interval = TiageStatistics.calculateConfidenceInterval(typicalValue, sigma, 80);
                html += '\
                    <div class="need-modal-statistics">\
                        <div class="need-modal-statistics-header">\
                            <span class="need-modal-statistics-icon">📊</span>\
                            <span class="need-modal-statistics-label">Statistischer Hintergrund</span>\
                        </div>\
                        <div class="need-modal-statistics-content">\
                            <div class="need-modal-statistics-text">\
                                80% der Befragten antworteten mit <strong>' + Math.round(interval.lower) + '-' + Math.round(interval.upper) + '</strong>\
                            </div>\
                            <div class="need-modal-statistics-sub">\
                                (Normalverteilung, σ=' + sigma + ', Konfidenzintervall ±' + Math.round(interval.margin) + ')\
                            </div>\
                        </div>\
                    </div>\
                ';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        /**
         * Hilfsfunktion: Extrahiert Wert aus flatNeeds (Array oder Object)
         * @param {Array|Object} flatNeeds - Die flatNeeds Daten
         * @param {string} needId - Die Bedürfnis-ID (z.B. '#B102')
         * @returns {number|undefined} Der Wert oder undefined
         */
        function getNeedValueFromFlatNeeds(flatNeeds, needId) {
            if (!flatNeeds) return undefined;

            // Normalisiere needId
            let bId = needId;
            if (needId && !needId.startsWith('#B') && typeof BeduerfnisIds !== 'undefined') {
                bId = BeduerfnisIds.toId(needId) || needId;
            }

            // Array-Format (v1.8.128+): [{ id, key, stringKey, label, value, locked }, ...]
            if (Array.isArray(flatNeeds)) {
                const found = flatNeeds.find(n =>
                    n.id === bId ||
                    n.id === needId ||
                    n.stringKey === needId ||
                    n.key === needId
                );
                return found ? found.value : undefined;
            }

            // Object-Format (legacy): { needId: value } oder { needId: { value, locked } }
            if (typeof flatNeeds === 'object') {
                const entry = flatNeeds[bId] || flatNeeds[needId];
                if (entry !== undefined) {
                    return typeof entry === 'object' ? entry.value : entry;
                }
                // Versuche mit string-key
                if (typeof BeduerfnisIds !== 'undefined') {
                    const stringKey = BeduerfnisIds.toKey(bId);
                    if (stringKey) {
                        const entryByKey = flatNeeds[stringKey];
                        if (entryByKey !== undefined) {
                            return typeof entryByKey === 'object' ? entryByKey.value : entryByKey;
                        }
                    }
                }
            }

            return undefined;
        }

        /**
         * Holt Vergleichs-Daten für ein Bedürfnis
         * PRIORITÄT: 1. LoadedArchetypProfile → 2. TiageState → 3. sessionStorage
         * @param {string} needId - Die ID des Bedürfnisses (z.B. '#B102')
         * @returns {object|null} { wert1, wert2, ichName, partnerName } oder null
         */
        function getComparisonData(needId) {
            // Normalisiere needId zu #B-Format
            let bId = needId;
            if (needId && !needId.startsWith('#B') && typeof BeduerfnisIds !== 'undefined') {
                bId = BeduerfnisIds.toId(needId) || needId;
            }

            // ═══════════════════════════════════════════════════════════════════
            // PRIORITÄT 1: LoadedArchetypProfile (Hauptdatenquelle)
            // ═══════════════════════════════════════════════════════════════════
            if (typeof window !== 'undefined' && window.LoadedArchetypProfile) {
                const ichProfile = window.LoadedArchetypProfile.ich;
                const partnerProfile = window.LoadedArchetypProfile.partner;

                if (ichProfile && partnerProfile) {
                    const ichFlatNeeds = ichProfile.profileReview?.flatNeeds;
                    const partnerFlatNeeds = partnerProfile.profileReview?.flatNeeds;

                    const wert1 = getNeedValueFromFlatNeeds(ichFlatNeeds, bId);
                    const wert2 = getNeedValueFromFlatNeeds(partnerFlatNeeds, bId);

                    if (wert1 !== undefined && wert2 !== undefined) {
                        console.log('[TiageSynthese] Daten aus LoadedArchetypProfile:', bId, '→ Ich:', wert1, 'Partner:', wert2);
                        return {
                            wert1: wert1,
                            wert2: wert2,
                            ichName: 'Ich',
                            partnerName: 'Partner'
                        };
                    }
                }
            }

            // ═══════════════════════════════════════════════════════════════════
            // PRIORITÄT 2: TiageState (Fallback)
            // ═══════════════════════════════════════════════════════════════════
            // FIX v4.3: getFlatNeeds() statt get() — gibt flache Needs für aktuellen Archetyp zurück
            if (typeof TiageState !== 'undefined' && TiageState.getFlatNeeds) {
                const ichNeeds = TiageState.getFlatNeeds('ich');
                const partnerNeeds = TiageState.getFlatNeeds('partner');

                // Prüfe ob beide vorhanden (Array oder Object)
                const ichHasData = ichNeeds && (Array.isArray(ichNeeds) ? ichNeeds.length > 0 : Object.keys(ichNeeds).length > 0);
                const partnerHasData = partnerNeeds && (Array.isArray(partnerNeeds) ? partnerNeeds.length > 0 : Object.keys(partnerNeeds).length > 0);

                if (ichHasData && partnerHasData) {
                    // Verwende getNeedValueFromFlatNeeds für beide Formate (Array/Object)
                    const wert1 = getNeedValueFromFlatNeeds(ichNeeds, bId);
                    const wert2 = getNeedValueFromFlatNeeds(partnerNeeds, bId);

                    if (wert1 !== undefined && wert2 !== undefined) {
                        console.log('[TiageSynthese] Daten aus TiageState:', bId, '→ Ich:', wert1, 'Partner:', wert2);
                        return { wert1, wert2, ichName: 'Ich', partnerName: 'Partner' };
                    }
                }
            }

            // ═══════════════════════════════════════════════════════════════════
            // PRIORITÄT 3: sessionStorage (Legacy-Support)
            // ═══════════════════════════════════════════════════════════════════
            try {
                const stored = sessionStorage.getItem('tiageSyntheseData');
                if (!stored) return null;

                const data = JSON.parse(stored);
                if (!data.resonanceMap) return null;

                let resonance = data.resonanceMap[bId] || data.resonanceMap[needId];
                if (!resonance && typeof BeduerfnisIds !== 'undefined') {
                    const asKey = BeduerfnisIds.toKey(bId);
                    if (asKey) resonance = data.resonanceMap[asKey];
                }

                if (!resonance) return null;

                console.log('[TiageSynthese] Daten aus sessionStorage:', bId);
                return {
                    wert1: resonance.wert1,
                    wert2: resonance.wert2,
                    ichName: data.ichName || 'Ich',
                    partnerName: data.partnerName || 'Partner'
                };
            } catch (e) {
                console.warn('[TiageSynthese] Fehler beim Laden aus sessionStorage:', e);
                return null;
            }
        }

        /**
         * Initialisierung
         */
        document.addEventListener('DOMContentLoaded', async function() {
            const params = new URLSearchParams(window.location.search);
            const needId = params.get('need') || params.get('needId');

            if (!needId) {
                document.getElementById('syntheseContent').innerHTML =
                    '<div class="synthese-error"><div class="synthese-error-icon">❓</div><p>Kein Bedürfnis angegeben.<br><small>URL-Parameter: ?need=bedürfnis_id</small></p></div>';
                return;
            }

            // Auf das Laden des Katalogs warten (wichtig für async JSON-Loading!)
            if (typeof BeduerfnisIds !== 'undefined' && typeof BeduerfnisIds.load === 'function') {
                try {
                    await BeduerfnisIds.load();
                } catch (e) {
                    console.warn('[TiageSynthese] Katalog-Laden fehlgeschlagen:', e);
                }
            }

            // Vergleichs-Daten laden (TiageState → sessionStorage)
            const comparisonData = getComparisonData(needId);

            renderNeedContent(needId, comparisonData);
        });
    </script>
</body>
</html>
